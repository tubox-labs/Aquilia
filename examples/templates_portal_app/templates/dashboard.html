<!doctype html>
<html lang="en">
<head><title>{{ product_name }} - {{ account.name }}</title></head>
<body>
  <main>
    <h1>{{ account.name }}</h1>
    <p class="balance">{{ account.balance|currency }}</p>
    <ul>
    {% for alert in account.alerts %}
      <li>{{ alert }}</li>
    {% endfor %}
    </ul>
  </main>
</body>
</html>
