<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aquilia Inspector</title>
    <style>
        {% include "partials/css.html" %}

        :root {
            /* Map to partials/css.html design tokens */
            --background: var(--bg-body);
            --surface: var(--bg-sidebar);
            --surface-dim: var(--bg-sidebar);
            --surface-bright: var(--bg-surface-hover);
            --surface-container-lowest: var(--bg-body);
            --surface-container-low: var(--bg-sidebar);
            --surface-container: var(--bg-glass);
            --surface-container-high: var(--border-color);
            --surface-container-highest: var(--border-subtle);
            --on-surface: var(--text-primary);
            --on-surface-variant: var(--text-secondary);
            --outline: var(--border-color);
            --outline-variant: var(--border-subtle);
            --primary: var(--accent);
            --secondary: var(--text-secondary);
            --error: var(--danger);
            --on-error: var(--text-primary);
            --error-container: var(--danger-subtle);
            --warning: var(--warning);
            --success: var(--success);

            --rail-green: var(--success);
            --rail-orange: var(--warning);
            --rail-red: var(--danger);
            --badge-post: var(--info);
            --badge-get: var(--success);

            --lane-gray: var(--text-muted);
            --lane-blue: var(--info);
            --lane-purple: var(--purple);
            --lane-teal: var(--accent);
            --lane-infoblue: var(--info);
        }

        .theme-ocean {
            --background: #081622;
            --surface: #0a1f30;
            --surface-container-lowest: #05121c;
            --surface-container-low: #0c273c;
            --surface-container: #10324c;
            --surface-container-high: #154264;
            --surface-container-highest: #1c527b;
            --surface-variant: #1e5c8a;
            --outline-variant: #236c9f;
            --on-surface: #e0f2fe;
            --on-surface-variant: #a5f3fc;
            --primary: #06b6d4;
            --primary-container: #0891b2;
            --secondary: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--background);
            color: var(--on-surface);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        code, pre {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
        }

        /* High density scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-variant); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--outline); }

        /* TopNav */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--surface-variant);
            padding: 0 16px;
            height: 48px;
            flex-shrink: 0;
            background-color: var(--surface-container-lowest);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 14px;
        }

        .brand img {
            height: 20px;
            width: auto;
            object-fit: contain;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--surface-container);
            border: 1px solid var(--surface-variant);
            border-radius: 2px;
            height: 28px;
            width: 240px;
            padding: 0 8px;
            transition: border-color 0.15s ease;
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
        }

        .search-wrapper svg {
            color: var(--on-surface-variant);
            width: 14px;
            height: 14px;
            margin-right: 6px;
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--on-surface);
            font-size: 12px;
            width: 100%;
        }

        .search-input::placeholder {
            color: var(--on-surface-variant);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Stream Indicator Badge */
        .stream-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--on-surface-variant);
            cursor: pointer;
            padding: 4px 8px;
            background-color: var(--surface-container);
            border: 1px solid var(--surface-variant);
            border-radius: 2px;
            user-select: none;
            transition: background-color 0.15s ease;
        }
        .stream-status-badge:hover {
            background-color: var(--surface-container-high);
        }
        .stream-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--rail-green);
        }
        .stream-dot.live {
            animation: pulse-dot 1.2s infinite;
        }
        .stream-dot.paused {
            background-color: var(--rail-orange);
            animation: none;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 28px;
            padding: 0 12px;
            background-color: var(--surface-variant);
            border: 1px solid var(--outline-variant);
            color: var(--on-surface);
            font-size: 12px;
            font-weight: 500;
            border-radius: 2px;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--surface-container-high);
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary-container);
            color: var(--on-primary);
        }
        .btn-primary:hover {
            background-color: var(--primary-fixed-dim);
        }

        /* Main layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        aside {
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid var(--surface-variant);
            display: flex;
            flex-direction: column;
            background-color: var(--surface-container-lowest);
            transition: transform 0.25s ease;
        }

        .trace-list-container {
            flex: 1;
            overflow-y: auto;
        }

        .details-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background-color: var(--background);
        }

        /* Request Rail */
        .rail-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--surface-container-highest);
            cursor: pointer;
            transition: background-color 0.15s ease;
            position: relative;
        }

        .rail-row:hover {
            background-color: var(--surface-container-low);
        }

        .rail-row.selected {
            background-color: var(--surface-container);
            border-left: 4px solid var(--primary);
            padding-left: 8px;
        }

        .rail-row-indicator {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .indicator-green { background-color: var(--rail-green); }
        .indicator-orange { background-color: var(--rail-orange); }
        .indicator-red { background-color: var(--rail-red); }

        .rail-row-content {
            flex: 1;
            min-width: 0;
        }

        .rail-row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            gap: 8px;
        }

        .rail-row-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .badge {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .badge-get { color: var(--badge-get); background-color: rgba(16, 185, 129, 0.1); }
        .badge-post { color: var(--badge-post); background-color: rgba(59, 130, 246, 0.1); }
        .badge-delete { color: #f87171; background-color: rgba(239, 68, 68, 0.1); }
        .badge-put-patch { color: #fbbf24; background-color: rgba(245, 158, 11, 0.1); }

        .path-text {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            font-size: 11px;
            color: var(--on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Search highlights */
        .highlight {
            background-color: rgba(75, 226, 119, 0.25);
            color: #ffffff;
            border-radius: 1px;
        }

        .status-text {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            font-size: 11px;
            font-weight: 500;
        }

        .status-success { color: var(--rail-green); }
        .status-error { color: var(--rail-red); }

        .rail-row-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .time-duration {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--on-surface-variant);
        }

        .duration-bar-bg {
            width: 64px;
            height: 4px;
            background-color: var(--surface-variant);
            border-radius: 2px;
            overflow: hidden;
        }

        .duration-bar {
            height: 100%;
            border-radius: 2px;
        }

        .bar-green { background-color: var(--rail-green); }
        .bar-orange { background-color: var(--rail-orange); }
        .bar-red { background-color: var(--rail-red); }
        .bar-blue { background-color: var(--lane-blue); }

        /* Details Header */
        .details-header {
            padding: 16px;
            border-bottom: 1px solid var(--surface-variant);
            background-color: rgba(23, 31, 51, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-shrink: 0;
        }

        .details-header-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .details-header-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--on-surface);
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
            word-break: break-all;
        }

        .details-header-badges {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 11px;
            color: var(--on-surface-variant);
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .status-badge {
            border-radius: 2px;
            padding: 1px 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .status-badge-success { background-color: rgba(34, 197, 94, 0.1); color: var(--rail-green); border-color: rgba(34, 197, 94, 0.2); }
        .status-badge-error { background-color: rgba(239, 68, 68, 0.1); color: var(--rail-red); border-color: rgba(239, 68, 68, 0.2); }
        .status-badge-warn { background-color: rgba(249, 115, 22, 0.1); color: var(--rail-orange); border-color: rgba(249, 115, 22, 0.2); }

        .details-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .copy-text-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--secondary);
            font-size: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-left: 4px;
            vertical-align: middle;
            opacity: 0.7;
        }
        .copy-text-btn:hover {
            opacity: 1;
            color: var(--primary);
        }
        .copy-text-btn svg {
            width: 10px;
            height: 10px;
            stroke-width: 2.5;
            fill: none;
            stroke: currentColor;
        }

        /* Waterfall Timeline */
        .waterfall-container {
            padding: 16px;
            border-bottom: 1px solid var(--surface-variant);
            flex-shrink: 0;
        }

        .waterfall-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--on-surface-variant);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .waterfall-box {
            border: 1px solid var(--surface-variant);
            border-radius: 2px;
            background-color: var(--surface-container-lowest);
            overflow: hidden;
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .waterfall-header-row {
            display: flex;
            background-color: var(--surface);
            height: 28px;
            align-items: center;
            padding: 0 8px;
            border-bottom: 1px solid var(--surface-variant);
            color: var(--on-surface-variant);
        }

        .waterfall-header-op {
            width: 33.333%;
            border-right: 1px solid var(--surface-variant);
            padding-right: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .waterfall-header-timeline {
            flex: 1;
            position: relative;
            height: 100%;
        }

        .waterfall-grid {
            background-image: linear-gradient(to right, var(--surface-variant) 1px, transparent 1px);
            background-size: 10% 100%;
        }

        .waterfall-header-timeline-max {
            position: absolute;
            right: 4px;
            top: 6px;
            font-size: 9px;
        }

        .waterfall-lanes {
            display: flex;
            flex-direction: column;
            padding: 4px 0;
            max-height: 156px;
            overflow-y: auto;
        }

        .waterfall-lane {
            display: flex;
            align-items: center;
            height: 24px;
            padding: 0 8px;
            transition: background-color 0.15s ease, opacity 0.2s ease, height 0.2s ease;
            overflow: hidden;
        }

        .waterfall-lane.collapsed-hidden {
            height: 0;
            padding: 0 8px;
            border: none;
            opacity: 0;
            pointer-events: none;
        }

        .waterfall-lane:hover {
            background-color: var(--surface-container);
        }

        .waterfall-lane-op {
            width: 33.333%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 8px;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
        }

        .waterfall-lane-timeline {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }

        .waterfall-span-bar {
            height: 8px;
            border-radius: 2px;
            position: absolute;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-lane-gray { background-color: var(--lane-gray); }
        .bg-lane-blue { background-color: var(--lane-blue); }
        .bg-lane-purple { background-color: var(--lane-purple); }
        .bg-lane-teal { background-color: var(--lane-teal); }
        .bg-lane-infoblue { background-color: var(--lane-infoblue); }
        .bg-lane-red { background-color: var(--rail-red); }

        .waterfall-lane-duration {
            font-size: 9px;
            color: var(--on-surface-variant);
            margin-left: auto;
            padding-right: 4px;
        }

        /* Tree Collapser Indicator */
        .tree-collapser {
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            color: var(--on-surface-variant);
            margin-right: 2px;
            border-radius: 2px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        .tree-collapser:hover {
            background-color: var(--surface-variant);
            color: var(--on-surface);
        }
        .tree-collapser svg {
            width: 8px;
            height: 8px;
            fill: currentColor;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tree-collapser.collapsed svg {
            transform: rotate(-90deg);
        }

        /* Tabs */
        .tabs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .tabs-bar {
            display: flex;
            border-bottom: 1px solid var(--surface-variant);
            background-color: var(--surface-container-lowest);
            padding: 0 16px;
            flex-shrink: 0;
        }

        .tab-btn {
            height: 36px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--on-surface-variant);
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
            display: flex;
            align-items: center;
        }

        .tab-btn:hover {
            color: var(--on-surface);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .tab-badge {
            margin-left: 6px;
            font-size: 9px;
            background-color: var(--surface-variant);
            color: var(--on-surface);
            padding: 1px 5px;
            border-radius: 10px;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: var(--surface);
        }

        .content-section {
            margin-bottom: 24px;
        }

        .content-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--on-surface-variant);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tables */
        .data-table-container {
            background-color: var(--surface-container-lowest);
            border: 1px solid var(--surface-variant);
            border-radius: 2px;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        .data-table tr {
            border-bottom: 1px solid rgba(61, 74, 61, 0.35);
        }

        .data-table tr:last-child {
            border-bottom: none;
        }

        .data-table tr:hover {
            background-color: rgba(34, 42, 61, 0.2);
        }

        .data-table td {
            padding: 8px 12px;
            vertical-align: top;
        }

        .data-table td.key-col {
            color: var(--secondary-fixed-dim);
            white-space: nowrap;
            width: 25%;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .data-table td.val-col {
            color: var(--on-surface);
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .data-table td.val-redacted {
            color: rgba(218, 226, 253, 0.6);
            font-style: italic;
        }

        /* Preformatted blocks */
        .code-block-container {
            position: relative;
            border: 1px solid var(--surface-variant);
            border-radius: 2px;
            overflow: hidden;
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface-container-lowest);
            padding: 6px 12px;
            border-bottom: 1px solid var(--surface-variant);
        }

        .code-block-lang {
            font-size: 11px;
            color: var(--on-surface-variant);
            text-transform: uppercase;
        }

        .code-block-copy {
            background: transparent;
            border: none;
            color: var(--secondary);
            font-size: 11px;
            cursor: pointer;
            font-weight: 500;
        }

        .code-block-copy:hover {
            color: var(--primary);
        }

        .code-block {
            background-color: var(--surface-container-lowest);
            padding: 12px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--on-surface);
        }

        /* Syntax highlighting */
        .json-key { color: #818cf8; }
        .json-string { color: #34d399; }
        .json-number { color: #fbbf24; }
        .json-boolean { color: #f87171; }
        .json-null { color: #9ca3af; }

        .sql-keyword { color: #f472b6; font-weight: bold; }
        .sql-string { color: #34d399; }
        .sql-number { color: #fbbf24; }

        /* Database SQL Queries Cards */
        .db-query-card {
            border: 1px solid var(--surface-variant);
            background-color: var(--surface-container-lowest);
            border-radius: 2px;
            padding: 12px;
            margin-bottom: 16px;
            position: relative;
        }

        .db-query-card:hover {
            border-color: var(--outline-variant);
        }

        .db-query-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .db-query-index {
            color: var(--lane-teal);
            font-weight: 700;
            text-transform: uppercase;
        }

        .db-query-duration {
            color: var(--lane-teal);
            font-weight: 600;
        }

        .db-query-code {
            background-color: rgba(11, 19, 38, 0.4);
            padding: 8px;
            border: 1px solid rgba(61, 74, 61, 0.3);
            border-radius: 2px;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--on-surface);
        }

        /* Dependencies Cards */
        .dep-card {
            border: 1px solid var(--surface-variant);
            background-color: var(--surface-container-lowest);
            border-radius: 2px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .dep-card-info {
            min-width: 0;
            flex: 1;
        }

        .dep-lane-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            border: 1px solid transparent;
        }

        .badge-external { background-color: rgba(14, 165, 233, 0.1); color: var(--lane-infoblue); border-color: rgba(14, 165, 233, 0.2); }
        .badge-dep { background-color: rgba(139, 92, 246, 0.1); color: var(--lane-purple); border-color: rgba(139, 92, 246, 0.2); }
        .badge-validation { background-color: rgba(249, 115, 22, 0.1); color: var(--rail-orange); border-color: rgba(249, 115, 22, 0.2); }

        .dep-label {
            font-size: 13px;
            margin-top: 8px;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .dep-duration {
            font-size: 12px;
            color: var(--on-surface-variant);
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        /* Exception Card */
        .err-card {
            border: 1px solid rgba(239, 68, 68, 0.3);
            background-color: rgba(239, 68, 68, 0.05);
            border-radius: 2px;
            padding: 16px;
        }

        .err-header-badge {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--rail-red);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .err-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--rail-red);
            margin-top: 8px;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace;
        }

        .err-meta {
            font-size: 11px;
            color: rgba(218, 226, 253, 0.8);
            margin-top: 4px;
        }

        .err-stack-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--on-surface-variant);
            margin-top: 16px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .err-stack {
            background-color: var(--surface-container-lowest);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 2px;
            padding: 12px;
            font-size: 12px;
            color: #fca5a5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Empty states */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--on-surface-variant);
            gap: 12px;
            padding: 24px;
            text-align: center;
        }

        .empty-state svg {
            width: 32px;
            height: 32px;
            opacity: 0.4;
            color: var(--outline);
        }

        .empty-state p {
            font-size: 13px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Modals and Overlays */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(6, 14, 32, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background-color: var(--surface);
            border: 1px solid var(--surface-variant);
            border-radius: 4px;
            width: 420px;
            max-width: 90%;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.open .modal-card {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: var(--surface-container-lowest);
            border-bottom: 1px solid var(--surface-variant);
        }
        .modal-header h3 {
            font-size: 13px;
            font-weight: 700;
        }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--on-surface-variant);
            cursor: pointer;
        }
        .modal-close:hover {
            color: var(--on-surface);
        }
        .modal-close svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        .modal-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--on-surface-variant);
        }
        .form-select, .form-input {
            background-color: var(--surface-container);
            border: 1px solid var(--surface-variant);
            color: var(--on-surface);
            height: 32px;
            padding: 0 8px;
            font-size: 12px;
            outline: none;
            border-radius: 2px;
            width: 100%;
        }
        .form-select:focus, .form-input:focus {
            border-color: var(--primary);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            font-weight: 600;
            color: var(--on-surface-variant);
        }
        .checkbox-group input {
            cursor: pointer;
        }

        /* Responsive Breakpoints */
        .back-btn {
            display: none;
        }

        @media (max-width: 768px) {
            aside {
                width: 100% !important;
                flex: 1;
            }
            .details-pane {
                display: none !important;
                width: 100% !important;
            }
            body.show-details aside {
                display: none !important;
            }
            body.show-details .details-pane {
                display: flex !important;
            }
            .back-btn {
                display: inline-flex !important;
                align-items: center;
                height: 28px;
                padding: 0 8px;
                background-color: var(--surface-variant);
                border: 1px solid var(--outline-variant);
                border-radius: 2px;
                color: var(--on-surface);
                cursor: pointer;
            }
            .details-header {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }
            .details-header-actions {
                width: 100%;
                justify-content: flex-end;
            }
            .waterfall-container {
                padding: 12px;
            }
            .tabs-bar {
                padding: 0 12px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .tab-btn {
                padding: 0 10px;
                flex-shrink: 0;
            }
            .search-wrapper {
                width: 150px;
            }
            .brand h2 {
                display: none;
            }
            .header-left {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- TopNav -->
    <header>
        <div class="header-left">
            <div class="brand">
                <img src="https://raw.githubusercontent.com/tubox-labs/Aquilia/master/assets/logo.png" alt="Aquilia Logo"/>
                <h2>Aquilia Inspector</h2>
            </div>
            <!-- Global Search/Filter -->
            <label class="search-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="traceSearch" class="search-input" placeholder="Filter..." value=""/>
            </label>
        </div>
        <div class="header-right">
            <!-- Stream Switch -->
            <div id="toggleStream" class="stream-status-badge" title="Click to Pause/Resume live stream">
                <div id="streamDot" class="stream-dot live"></div>
                <span id="streamStatusText">LIVE</span>
            </div>
            <button id="btnClearAll" class="btn">
                <span>Clear</span>
            </button>
            <button id="btnSettings" class="btn" title="Open Inspector Settings">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Left Pane: Request Rail -->
        <aside>
            <div id="traceList" class="trace-list-container">
                <!-- Dynamically populated -->
            </div>
        </aside>

        <!-- Right Pane: Detail View -->
        <section id="traceDetails" class="details-pane">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                <p>Select a request trace from the list to view its timeline and details.</p>
            </div>
        </section>
    </main>

    <!-- Custom Modal/Dialog Box (Replaces default alerts/confirms) -->
    <div id="customDialog" class="modal-overlay">
        <div class="modal-card" style="width: 380px;">
            <div class="modal-header">
                <h3 id="dialogTitle">Notification</h3>
                <button id="btnDialogClose" class="modal-close">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" style="gap: 12px;">
                <p id="dialogMessage" style="font-size: 13px; color: var(--on-surface); line-height: 1.5;"></p>
                <div id="dialogActions" style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
                    <button id="btnDialogCancel" class="btn" style="height: 30px;">Cancel</button>
                    <button id="btnDialogConfirm" class="btn btn-primary" style="height: 30px;">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Inspector Settings</h3>
                <button id="btnSettingsClose" class="modal-close">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="themeSelect">Theme Preset</label>
                    <select id="themeSelect" class="form-select">
                        <option value="default">Spyglass Dark</option>
                        <option value="ocean">Ocean Blue Dark</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="limitInput">Max Traces in UI</label>
                    <input id="limitInput" type="number" class="form-input" min="10" max="1000" value="100"/>
                </div>
                <label class="checkbox-group">
                    <input id="autoscrollCheck" type="checkbox" checked/>
                    <span>Auto-scroll to newest trace</span>
                </label>
            </div>
        </div>
    </div>

    <script nonce="__CSP_NONCE__">
        document.addEventListener("DOMContentLoaded", () => {
            const urlPrefix = "{{ url_prefix|default('/__aquilia__/inspector') }}";
            const traceList = document.getElementById("traceList");
            const traceDetails = document.getElementById("traceDetails");
            const traceSearch = document.getElementById("traceSearch");
            const btnClearAll = document.getElementById("btnClearAll");
            const btnSettings = document.getElementById("btnSettings");
            const btnSettingsClose = document.getElementById("btnSettingsClose");
            const settingsModal = document.getElementById("settingsModal");
            const toggleStream = document.getElementById("toggleStream");
            const streamDot = document.getElementById("streamDot");
            const streamStatusText = document.getElementById("streamStatusText");

            // Form bindings
            const themeSelect = document.getElementById("themeSelect");
            const limitInput = document.getElementById("limitInput");
            const autoscrollCheck = document.getElementById("autoscrollCheck");

            // Custom Dialog components
            const customDialog = document.getElementById("customDialog");
            const dialogTitle = document.getElementById("dialogTitle");
            const dialogMessage = document.getElementById("dialogMessage");
            const btnDialogCancel = document.getElementById("btnDialogCancel");
            const btnDialogConfirm = document.getElementById("btnDialogConfirm");
            const btnDialogClose = document.getElementById("btnDialogClose");

            let allTraces = [];
            let selectedTraceId = null;
            let activeTab = "request";
            let isStreamPaused = false;
            let collapsedSpans = new Set(); 

            // Local settings
            let settings = {
                theme: localStorage.getItem("aq_inspector_theme") || "default",
                maxTraces: parseInt(localStorage.getItem("aq_inspector_max")) || 100,
                autoscroll: localStorage.getItem("aq_inspector_scroll") !== "false"
            };

            // Apply loaded settings
            applySettings();

            // Load initial traces
            fetchTraces();



            // Custom Dialog functions
            function showAlert(message, title = "Notification") {
                dialogTitle.innerText = title;
                dialogMessage.innerText = message;
                btnDialogCancel.style.display = "none";
                btnDialogConfirm.innerText = "OK";
                btnDialogConfirm.onclick = () => {
                    customDialog.classList.remove("open");
                };
                btnDialogClose.onclick = () => {
                    customDialog.classList.remove("open");
                };
                customDialog.classList.add("open");
            }

            function showConfirm(message, callback, title = "Confirmation") {
                dialogTitle.innerText = title;
                dialogMessage.innerText = message;
                btnDialogCancel.style.display = "inline-flex";
                btnDialogConfirm.innerText = "Proceed";
                btnDialogConfirm.onclick = () => {
                    customDialog.classList.remove("open");
                    if (callback) callback();
                };
                btnDialogCancel.onclick = () => {
                    customDialog.classList.remove("open");
                };
                btnDialogClose.onclick = () => {
                    customDialog.classList.remove("open");
                };
                customDialog.classList.add("open");
            }

            // Syntax highlighting functions
            function highlightJson(jsonStr) {
                if (!jsonStr) return "";
                try {
                    const obj = JSON.parse(jsonStr);
                    jsonStr = JSON.stringify(obj, null, 2);
                } catch (e) {}

                let escaped = escapeHtml(jsonStr);
                return escaped.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                    let cls = 'number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'key';
                        } else {
                            cls = 'string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'boolean';
                    } else if (/null/.test(match)) {
                        cls = 'null';
                    }
                    return '<span class="json-' + cls + '">' + match + '</span>';
                });
            }

            function highlightSql(sqlStr) {
                if (!sqlStr) return "";
                let escaped = escapeHtml(sqlStr);
                const keywords = [
                    "SELECT", "FROM", "WHERE", "INSERT", "UPDATE", "DELETE", "JOIN", 
                    "INNER", "LEFT", "RIGHT", "OUTER", "ON", "AND", "OR", "LIMIT", 
                    "OFFSET", "GROUP BY", "ORDER BY", "HAVING", "CREATE", "DROP", "ALTER",
                    "TABLE", "INTO", "VALUES", "SET", "AS", "IN", "IS", "NULL", "NOT"
                ];
                const regex = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
                return escaped.replace(regex, '<span class="sql-keyword">$1</span>')
                              .replace(/'([^']*)'/g, '<span class="sql-string">\'$1\'</span>')
                              .replace(/\b(\d+)\b/g, '<span class="sql-number">$1</span>');
            }

            // Toggle stream pause
            toggleStream.addEventListener("click", () => {
                isStreamPaused = !isStreamPaused;
                if (isStreamPaused) {
                    streamDot.className = "stream-dot paused";
                    streamStatusText.innerText = "PAUSED";
                    toggleStream.title = "Live stream paused. Click to Resume.";
                } else {
                    streamDot.className = "stream-dot live";
                    streamStatusText.innerText = "LIVE";
                    toggleStream.title = "Live stream active. Click to Pause.";
                    fetchTraces();
                }
            });

            // Settings modal triggers
            btnSettings.addEventListener("click", () => {
                settingsModal.classList.add("open");
            });
            btnSettingsClose.addEventListener("click", () => {
                settingsModal.classList.remove("open");
            });
            settingsModal.addEventListener("click", (e) => {
                if (e.target === settingsModal) {
                    settingsModal.classList.remove("open");
                }
            });

            themeSelect.addEventListener("change", () => {
                settings.theme = themeSelect.value;
                localStorage.setItem("aq_inspector_theme", settings.theme);
                applySettings();
            });
            limitInput.addEventListener("change", () => {
                settings.maxTraces = Math.max(10, Math.min(1000, parseInt(limitInput.value) || 100));
                localStorage.setItem("aq_inspector_max", settings.maxTraces);
            });
            autoscrollCheck.addEventListener("change", () => {
                settings.autoscroll = autoscrollCheck.checked;
                localStorage.setItem("aq_inspector_scroll", settings.autoscroll);
            });

            // Clear traces listener
            btnClearAll.addEventListener("click", () => {
                showConfirm("Are you sure you want to clear all traces?", () => {
                    fetch(urlPrefix + "/api/clear/", { method: "POST" })
                        .then(res => res.json())
                        .then(data => {
                            allTraces = [];
                            selectedTraceId = null;
                            collapsedSpans.clear();
                            document.body.classList.remove("show-details");
                            renderList();
                            renderEmptyState();
                        })
                        .catch(err => showAlert("Failed to clear traces: " + err.message, "Error"));
                }, "Clear Traces");
            });

            // SSE EventSource setup
            const eventSource = new EventSource(urlPrefix + "/stream/");
            eventSource.addEventListener("trace", (e) => {
                if (isStreamPaused) return;
                try {
                    const trace = JSON.parse(e.data);
                    processIncomingTrace(trace);
                } catch (err) {
                    console.error("Failed to parse live trace event", err);
                }
            });

            traceSearch.addEventListener("input", () => {
                renderList();
            });

            function processIncomingTrace(trace) {
                const idx = allTraces.findIndex(t => t.trace_id === trace.trace_id);
                if (idx > -1) {
                    allTraces[idx] = trace;
                } else {
                    allTraces.unshift(trace);
                    if (allTraces.length > settings.maxTraces) {
                        allTraces.pop();
                    }
                }
                renderList();
                if (selectedTraceId === trace.trace_id) {
                    renderDetails(trace);
                }
                if (settings.autoscroll && idx === -1) {
                    traceList.scrollTop = 0;
                }
            }

            function applySettings() {
                if (settings.theme === "ocean") {
                    document.body.classList.add("theme-ocean");
                } else {
                    document.body.classList.remove("theme-ocean");
                }
                themeSelect.value = settings.theme;
                limitInput.value = settings.maxTraces;
                autoscrollCheck.checked = settings.autoscroll;
            }

            function fetchTraces() {
                fetch(urlPrefix + "/api/traces/")
                    .then(res => res.json())
                    .then(data => {
                        allTraces = data.slice(0, settings.maxTraces);
                        renderList();
                        if (!selectedTraceId && allTraces.length > 0) {
                            selectedTraceId = allTraces[0].trace_id;
                            renderDetails(allTraces[0]);
                            renderList();
                        }
                    })
                    .catch(err => console.error("Failed to fetch traces", err));
            }



            function getRelativeTime(timestamp) {
                const diff = Math.floor(Date.now() / 1000 - timestamp);
                if (diff < 5) return "just now";
                if (diff < 60) return `${diff}s ago`;
                if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
                if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
                return `${Math.floor(diff / 86400)}d ago`;
            }

            function renderEmptyState() {
                traceDetails.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                        <p>Select a request trace from the list to view its timeline and details.</p>
                    </div>
                `;
            }

            function highlightText(text, searchVal) {
                if (!searchVal) return escapeHtml(text);
                const escapedSearch = searchVal.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`(${escapedSearch})`, 'gi');
                return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
            }

            function renderList() {
                const query = traceSearch.value.toLowerCase().trim();
                traceList.innerHTML = "";

                const filtered = allTraces.filter(t => {
                    return t.path.toLowerCase().includes(query) || 
                           t.method.toLowerCase().includes(query) || 
                           (t.status_code && String(t.status_code).includes(query));
                });

                if (filtered.length === 0) {
                    traceList.innerHTML = `<div style="text-align: center; padding: 32px; color: var(--on-surface-variant); font-size: 12px;">No traces found</div>`;
                    return;
                }

                const maxDuration = Math.max(...allTraces.map(t => t.duration_ms || 1), 1);

                filtered.forEach(t => {
                    const isSelected = selectedTraceId === t.trace_id;
                    const item = document.createElement("div");
                    item.className = `rail-row ${isSelected ? 'selected' : ''}`;
                    
                    let indicatorColor = 'indicator-green';
                    if (t.status_code >= 500 || t.exception) {
                        indicatorColor = 'indicator-red';
                    } else if (t.status_code >= 400) {
                        indicatorColor = 'indicator-orange';
                    }
                    
                    let badgeStyle = 'text-gray-400 bg-gray-400/10';
                    if (t.method === 'GET') {
                        badgeStyle = 'badge-get';
                    } else if (t.method === 'POST') {
                        badgeStyle = 'badge-post';
                    } else if (t.method === 'DELETE') {
                        badgeStyle = 'badge-delete';
                    } else if (['PUT', 'PATCH'].includes(t.method)) {
                        badgeStyle = 'badge-put-patch';
                    }
                    
                    let barColor = 'bar-green';
                    if (t.status_code >= 500 || t.exception) {
                        barColor = 'bar-red';
                    } else if (t.duration_ms >= 500) {
                        barColor = 'bar-orange';
                    } else if (t.method === 'POST') {
                        barColor = 'bar-blue';
                    }
                    
                    const widthPct = Math.max(2, Math.min(100, (t.duration_ms / maxDuration) * 100));
                    const durationStr = t.duration_ms ? `${t.duration_ms.toFixed(0)}ms` : "pending";
                    const timeStr = getRelativeTime(t.started_at);
                    const statusText = t.status_code || "—";
                    const statusColorClass = t.status_code >= 400 ? 'status-error' : 'status-success';

                    const highlightedPath = highlightText(t.path, query);

                    item.innerHTML = `
                        ${isSelected ? '' : `<div class="rail-row-indicator ${indicatorColor}"></div>`}
                        <div class="rail-row-content">
                            <div class="rail-row-header">
                                <div class="rail-row-meta">
                                    <span class="badge ${badgeStyle}">${t.method}</span>
                                    <span class="path-text">${highlightedPath}</span>
                                </div>
                                <span class="status-text ${statusColorClass}">${statusText}</span>
                            </div>
                            <div class="rail-row-footer">
                                <div class="time-duration">
                                    <span>${durationStr}</span>
                                    <span>•</span>
                                    <span>${timeStr}</span>
                                </div>
                                <div class="duration-bar-bg">
                                    <div class="duration-bar ${barColor}" style="width: ${widthPct.toFixed(0)}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    item.addEventListener("click", () => {
                        selectedTraceId = t.trace_id;
                        document.body.classList.add("show-details");
                        renderList();
                        renderDetails(t);
                    });

                    traceList.appendChild(item);
                });
            }

            function renderDetails(trace) {
                const dbCount = trace.spans.filter(s => s.lane === 'database').length;
                const depCount = trace.spans.filter(s => ['external_http', 'dependency', 'validation', 'effect'].includes(s.lane)).length;
                const hasException = !!trace.exception;

                if (activeTab === "exception" && !hasException) {
                    activeTab = "request";
                }

                let statusBadgeClass = 'status-badge-success';
                let statusName = `${trace.status_code || 200} OK`;
                if (trace.status_code >= 500 || trace.exception) {
                    statusBadgeClass = 'status-badge-error';
                    statusName = `${trace.status_code || 500} Server Error`;
                } else if (trace.status_code >= 400) {
                    statusBadgeClass = 'status-badge-warn';
                    statusName = `${trace.status_code} Client Error`;
                }

                traceDetails.innerHTML = `
                    <div class="fade-in" style="display: flex; flex-direction: column; height: 100%;">
                        <!-- Detail Header -->
                        <div class="details-header">
                            <div class="details-header-info" style="width: 100%;">
                                <div style="display: flex; align-items: center; width: 100%; margin-bottom: 4px; gap: 8px;">
                                    <button id="btnBackToList" class="back-btn">
                                        <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5;"><polyline points="15 18 9 12 15 6"/></svg>
                                        <span style="font-size: 11px; margin-left: 2px;">Back</span>
                                    </button>
                                    <h1 class="details-header-title" style="flex: 1;">
                                        ${trace.method} ${escapeHtml(trace.path)}
                                    </h1>
                                </div>
                                <div class="details-header-badges" style="margin-top: 4px;">
                                    <span class="status-badge ${statusBadgeClass}">${statusName}</span>
                                    <span>${trace.duration_ms.toFixed(1)}ms total</span>
                                    <span>IP: ${trace.client_addr || '—'}
                                        ${trace.client_addr ? `<button class="copy-text-btn" data-action="copy-ip" data-value="${trace.client_addr}" title="Copy IP"><svg viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>` : ''}
                                    </span>
                                    <span>ID: ${trace.trace_id}
                                        <button class="copy-text-btn" data-action="copy-trace-id" data-value="${trace.trace_id}" title="Copy Trace ID"><svg viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
                                    </span>
                                </div>
                            </div>
                            <div class="details-header-actions">
                                <button id="btnReplay" class="btn">
                                    <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                                    <span>Replay</span>
                                </button>
                                <button id="btnCurl" class="btn">
                                    <svg viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                    <span>cURL</span>
                                </button>
                                <button id="btnJson" class="btn">
                                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                    <span>JSON</span>
                                </button>
                            </div>
                        </div>

                        <!-- Waterfall Section -->
                        <div class="waterfall-container">
                            <h3 class="waterfall-title">
                                <span>Execution Timeline</span>
                                <span style="font-size:10px;text-transform:none;opacity:0.7;">Click arrow to collapse</span>
                            </h3>
                            <div class="waterfall-box">
                                <div class="waterfall-header-row">
                                    <div class="waterfall-header-op">Operation</div>
                                    <div class="waterfall-header-timeline waterfall-grid">
                                        <span class="waterfall-header-timeline-max">${trace.duration_ms.toFixed(1)}ms</span>
                                    </div>
                                </div>
                                <div id="waterfallLanes" class="waterfall-lanes">
                                    <!-- Generated Dynamically -->
                                </div>
                            </div>
                        </div>

                        <!-- Tabs Section -->
                        <div class="tabs-container">
                            <div class="tabs-bar">
                                <button data-tab="request" class="tab-btn ${activeTab === 'request' ? 'active' : ''}">Request</button>
                                <button data-tab="response" class="tab-btn ${activeTab === 'response' ? 'active' : ''}">Response</button>
                                <button data-tab="database" class="tab-btn ${activeTab === 'database' ? 'active' : ''}">Database <span class="tab-badge">${dbCount}</span></button>
                                <button data-tab="dependencies" class="tab-btn ${activeTab === 'dependencies' ? 'active' : ''}">Dependencies <span class="tab-badge">${depCount}</span></button>
                                <button data-tab="exception" class="tab-btn ${!hasException ? 'disabled' : ''} ${activeTab === 'exception' ? 'active' : ''}" ${!hasException ? 'disabled' : ''}>Exception</button>
                            </div>
                            <div id="tabContent" class="tab-content fade-in">
                                <!-- Tab Content -->
                            </div>
                        </div>
                    </div>
                `;

                // Bind back button
                const backBtn = document.getElementById("btnBackToList");
                if (backBtn) {
                    backBtn.addEventListener("click", () => {
                        document.body.classList.remove("show-details");
                    });
                }

                renderWaterfall(trace);
                renderTabContent(trace);

                // Bind tab triggers
                document.querySelectorAll(".tab-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        const tab = btn.dataset.tab;
                        if (tab === "exception" && !hasException) return;
                        activeTab = tab;
                        
                        document.querySelectorAll(".tab-btn").forEach(el => {
                            el.classList.remove("active");
                        });
                        btn.classList.add("active");

                        // Apply smooth fade-in class on content swap
                        const tabContent = document.getElementById("tabContent");
                        tabContent.classList.remove("fade-in");
                        void tabContent.offsetWidth; 
                        tabContent.classList.add("fade-in");

                        renderTabContent(trace);
                    });
                });

                // Bind actions
                document.getElementById("btnReplay").addEventListener("click", () => {
                    const mutate = !["GET", "HEAD", "OPTIONS"].includes(trace.method);
                    let confirmMsg = "Are you sure you want to replay this request?";
                    if (mutate) {
                        confirmMsg = "Warning: This is a mutating request (POST/PUT/PATCH/DELETE). Replaying will execute it against the live server. Do you want to proceed?";
                    }
                    showConfirm(confirmMsg, () => {
                        const headers = {};
                        if (mutate) {
                            headers["X-Aquilia-Allow-Replay-Mutation"] = "true";
                        }
                        const replayBtn = document.getElementById("btnReplay");
                        replayBtn.innerHTML = `<svg class="animate-spin" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg><span>Replaying...</span>`;
                        replayBtn.disabled = true;

                        fetch(`${urlPrefix}/api/traces/${trace.trace_id}/replay/`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                ...headers
                            }
                        })
                        .then(res => {
                            if (!res.ok) {
                                return res.json().then(
                                    data => { throw new Error(typeof data.error === 'object' ? JSON.stringify(data.error) : (data.error || 'Server error')); },
                                    () => { throw new Error(`HTTP ${res.status}`); }
                                );
                            }
                            return res.json();
                        })
                        .then(data => {
                            showAlert(`Replay completed successfully. Status code: ${data.status}`, "Success");
                            fetchTraces();
                        })
                        .catch(err => {
                            showAlert(`Replay failed: ${err.message}`, "Error");
                        })
                        .finally(() => {
                            replayBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg><span>Replay</span>`;
                            replayBtn.disabled = false;
                        });
                    }, "Replay Request");
                });

                document.getElementById("btnCurl").addEventListener("click", () => {
                    let cmd = `curl -X ${trace.method} "${window.location.origin}${trace.path}"`;
                    if (trace.request_headers) {
                        for (const [k, v] of Object.entries(trace.request_headers)) {
                            cmd += ` -H "${k}: ${v}"`;
                        }
                    }
                    if (trace.request_body_preview) {
                        cmd += ` -d '${trace.request_body_preview.replace(/'/g, "'\\''")}'`;
                    }
                    navigator.clipboard.writeText(cmd).then(() => {
                        showAlert("cURL command copied to clipboard!", "Copied");
                    });
                });

                document.getElementById("btnJson").addEventListener("click", () => {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trace, null, 2));
                    const dlAnchor = document.createElement('a');
                    dlAnchor.setAttribute("href", dataStr);
                    dlAnchor.setAttribute("download", `trace-${trace.trace_id}.json`);
                    document.body.appendChild(dlAnchor);
                    dlAnchor.click();
                    dlAnchor.remove();
                });
            }

            // CSP-compliant event delegation on trace details click
            traceDetails.addEventListener("click", (e) => {
                const target = e.target.closest("[data-action]");
                if (!target) return;

                const action = target.dataset.action;
                if (action === "copy-ip" || action === "copy-trace-id") {
                    const val = target.dataset.value;
                    navigator.clipboard.writeText(val).then(() => {
                        showAlert("Copied to clipboard!", "Success");
                    });
                } else if (action === "copy-req-body") {
                    const code = document.getElementById("reqBodyPre").innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        showAlert("Request body copied!", "Success");
                    });
                } else if (action === "copy-resp-body") {
                    const code = document.getElementById("respBodyPre").innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        showAlert("Response body copied!", "Success");
                    });
                } else if (action === "copy-sql") {
                    const idx = target.dataset.index;
                    const code = document.getElementById(`sqlCode_${idx}`).innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        showAlert("SQL query copied!", "Success");
                    });
                } else if (action === "toggle-span") {
                    const spanId = target.dataset.spanId;
                    if (collapsedSpans.has(spanId)) {
                        collapsedSpans.delete(spanId);
                    } else {
                        collapsedSpans.add(spanId);
                    }
                    const trace = allTraces.find(t => t.trace_id === selectedTraceId);
                    if (trace) renderWaterfall(trace);
                }
            });

            function renderWaterfall(trace) {
                const lanesContainer = document.getElementById("waterfallLanes");
                lanesContainer.innerHTML = "";

                if (!trace.spans || trace.spans.length === 0) {
                    lanesContainer.innerHTML = `<div style="text-align: center; padding: 12px; opacity: 0.5;">No spans recorded.</div>`;
                    return;
                }

                const totalDuration = trace.duration_ms || 1.0;
                
                const spanDepth = {};
                trace.spans.forEach(s => {
                    let depth = 0;
                    let pId = s.parent_id;
                    while (pId) {
                        const parent = trace.spans.find(parentSpan => parentSpan.id === pId);
                        if (parent) {
                            depth++;
                            pId = parent.parent_id;
                        } else {
                            break;
                        }
                    }
                    spanDepth[s.id] = depth;
                });

                const parentIds = new Set();
                trace.spans.forEach(s => {
                    if (s.parent_id) {
                        parentIds.add(s.parent_id);
                    }
                });

                const hiddenSpans = new Set();
                trace.spans.forEach(s => {
                    let pId = s.parent_id;
                    while (pId) {
                        if (collapsedSpans.has(pId)) {
                            hiddenSpans.add(s.id);
                            break;
                        }
                        const parent = trace.spans.find(parentSpan => parentSpan.id === pId);
                        pId = parent ? parent.parent_id : null;
                    }
                });

                trace.spans.forEach(s => {
                    const isHidden = hiddenSpans.has(s.id);
                    const leftPct = (s.start_offset_ms / totalDuration) * 100;
                    const widthPct = (s.duration_ms / totalDuration) * 100;
                    
                    let laneColorClass = "bg-lane-gray";
                    if (s.lane === "database") laneColorClass = "bg-lane-teal";
                    else if (s.lane === "external_http") laneColorClass = "bg-lane-infoblue";
                    else if (s.lane === "middleware") laneColorClass = "bg-lane-blue";
                    else if (s.lane === "dependency") laneColorClass = "bg-lane-purple";
                    else if (s.lane === "validation") laneColorClass = "bg-lane-red"; 
                    else if (s.lane === "handler") laneColorClass = "bg-lane-purple";
                    else if (s.lane === "exception") laneColorClass = "bg-lane-red";

                    const depth = spanDepth[s.id] || 0;
                    const indentStyle = `padding-left: ${8 + depth * 12}px;`;
                    
                    let collapserHtml = "";
                    if (parentIds.has(s.id)) {
                        const isCollapsed = collapsedSpans.has(s.id);
                        collapserHtml = `
                            <span class="tree-collapser ${isCollapsed ? 'collapsed' : ''}" data-action="toggle-span" data-span-id="${s.id}">
                                <svg viewBox="0 0 24 24"><polygon points="6,9 12,15 18,9"/></svg>
                            </span>
                        `;
                    } else if (depth > 0) {
                        collapserHtml = `<span style="opacity: 0.3; margin-right: 4px; font-family: monospace;">└</span>`;
                    }

                    const row = document.createElement("div");
                    row.className = `waterfall-lane ${isHidden ? 'collapsed-hidden' : ''}`;
                    row.innerHTML = `
                        <div class="waterfall-lane-op" style="${indentStyle}" title="${escapeHtml(s.label)}">
                            ${collapserHtml}
                            <span class="truncate">${escapeHtml(s.label)}</span>
                        </div>
                        <div class="waterfall-lane-timeline">
                            <div class="waterfall-span-bar ${laneColorClass}" style="left:${leftPct.toFixed(2)}%; width:${Math.max(0.5, widthPct).toFixed(2)}%;"></div>
                            <span class="waterfall-lane-duration">${s.duration_ms.toFixed(1)}ms</span>
                        </div>
                    `;
                    lanesContainer.appendChild(row);
                });
            }

            function renderTabContent(trace) {
                const tabContent = document.getElementById("tabContent");
                tabContent.innerHTML = "";

                if (activeTab === "request") {
                    // Headers
                    let headersRows = "";
                    if (trace.request_headers && Object.keys(trace.request_headers).length > 0) {
                        for (const [k, v] of Object.entries(trace.request_headers)) {
                            const isSensitive = ["authorization", "cookie", "set-cookie", "x-api-key", "x-auth-token"].includes(k.toLowerCase());
                            const valClass = isSensitive ? "val-redacted" : "";
                            headersRows += `
                                <tr>
                                    <td class="key-col">${escapeHtml(k)}</td>
                                    <td class="val-col ${valClass}">${escapeHtml(v)}</td>
                                </tr>
                            `;
                        }
                    } else {
                        headersRows = `<tr><td colspan="2" style="text-align: center; opacity: 0.5;">No request headers captured.</td></tr>`;
                    }

                    // Query Params
                    let queryRows = "";
                    if (trace.query_params && Object.keys(trace.query_params).length > 0) {
                        for (const [k, v] of Object.entries(trace.query_params)) {
                            queryRows += `
                                <tr>
                                    <td class="key-col">${escapeHtml(k)}</td>
                                    <td class="val-col">${escapeHtml(JSON.stringify(v))}</td>
                                </tr>
                            `;
                        }
                    }

                    // Request Body
                    let bodyBlock = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No request body captured.</div>`;
                    if (trace.request_body_preview) {
                        bodyBlock = `
                            <div class="code-block-container">
                                <div class="code-block-header">
                                    <span class="code-block-lang">application/json</span>
                                    <button data-action="copy-req-body" class="code-block-copy">Copy</button>
                                </div>
                                <pre class="code-block"><code id="reqBodyPre">${highlightJson(trace.request_body_preview)}</code></pre>
                            </div>
                        `;
                    }

                    tabContent.innerHTML = `
                        <!-- Headers -->
                        <div class="content-section">
                            <h4 class="content-section-title">Headers</h4>
                            <div class="data-table-container">
                                <table class="data-table">
                                    <tbody>
                                        ${headersRows}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Query Parameters -->
                        <div class="content-section">
                            <h4 class="content-section-title">Query Parameters</h4>
                            ${queryRows ? `
                            <div class="data-table-container">
                                <table class="data-table">
                                    <tbody>
                                        ${queryRows}
                                    </tbody>
                                </table>
                            </div>
