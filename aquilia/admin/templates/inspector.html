                            ` : `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No query parameters provided.</div>`}
                        </div>

                        <!-- Body -->
                        <div class="content-section">
                            <h4 class="content-section-title">Request Body</h4>
                            ${bodyBlock}
                        </div>
                    `;
                }

                else if (activeTab === "response") {
                    if (!trace.response) {
                        tabContent.innerHTML = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No response captured yet (pending).</div>`;
                        return;
                    }

                    let bodyBlock = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No response body captured.</div>`;
                    if (trace.response.preview) {
                        bodyBlock = `
                            <div class="code-block-container">
                                <div class="code-block-header">
                                    <span class="code-block-lang">Response Preview</span>
                                    <button data-action="copy-resp-body" class="code-block-copy">Copy</button>
                                </div>
                                <pre class="code-block"><code id="respBodyPre">${highlightJson(trace.response.preview)}</code></pre>
                            </div>
                        `;
                    }

                    tabContent.innerHTML = `
                        <!-- Metadata -->
                        <div class="content-section">
                            <h4 class="content-section-title">Metadata</h4>
                            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                                <div style="flex: 1; min-width: 100px; background-color: var(--surface-container-lowest); border: 1px solid var(--surface-variant); padding: 8px; border-radius: 2px; font-family: monospace;">
                                    <div style="font-size: 9px; color: var(--on-surface-variant); text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Status</div>
                                    <div style="font-size: 14px; font-weight: 600;">${trace.response.status}</div>
                                </div>
                                <div style="flex: 1; min-width: 100px; background-color: var(--surface-container-lowest); border: 1px solid var(--surface-variant); padding: 8px; border-radius: 2px; font-family: monospace;">
                                    <div style="font-size: 9px; color: var(--on-surface-variant); text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Size</div>
                                    <div style="font-size: 14px; font-weight: 600;">${trace.response.size_bytes} bytes</div>
                                </div>
                                <div style="flex: 1; min-width: 150px; background-color: var(--surface-container-lowest); border: 1px solid var(--surface-variant); padding: 8px; border-radius: 2px; font-family: monospace;">
                                    <div style="font-size: 9px; color: var(--on-surface-variant); text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Content-Type</div>
                                    <div style="font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(trace.response.content_type)}">${escapeHtml(trace.response.content_type)}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Body -->
                        <div class="content-section">
                            <h4 class="content-section-title">Response Body</h4>
                            ${bodyBlock}
                        </div>
                    `;
                }

                else if (activeTab === "database") {
                    const dbSpans = trace.spans.filter(s => s.lane === 'database');
                    if (dbSpans.length === 0) {
                        tabContent.innerHTML = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No database queries recorded for this trace.</div>`;
                        return;
                    }

                    let listHtml = `<div>`;
                    dbSpans.forEach((s, idx) => {
                        const n1Patterns = trace.n_plus_one || [];
                        const isN1 = n1Patterns.some(p => p.pattern_sql === s.label || s.label.includes(p.pattern_sql));
                        let n1Badge = "";
                        if (isN1) {
                            n1Badge = `<span class="badge-n1" style="background-color: var(--rail-orange); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px;">N+1 Warning</span>`;
                        }

                        let explainHtml = "";
                        if (s.detail && s.detail.explain_plan) {
                            explainHtml = `
                                <div class="db-query-explain" style="margin-top: 8px; padding: 8px; background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--primary); font-family: var(--font-mono); font-size: 11px; overflow-x: auto; white-space: pre-wrap; border-radius: var(--radius-xs);">
                                    <strong>EXPLAIN Plan:</strong><br/>
                                    ${escapeHtml(s.detail.explain_plan)}
                                </div>
                            `;
                        }

                        listHtml += `
                            <div class="db-query-card">
                                <div class="db-query-meta">
                                    <span class="db-query-index">SQL Query #${idx + 1}${n1Badge}</span>
                                    <div style="display: flex; gap: 8px; align-items: center;">
                                        <span class="db-query-duration">${s.duration_ms.toFixed(1)}ms</span>
                                        <button data-action="copy-sql" data-index="${idx}" class="code-block-copy">Copy</button>
                                    </div>
                                </div>
                                <pre id="sqlCode_${idx}" class="db-query-code">${highlightSql(s.label)}</pre>
                                ${explainHtml}
                            </div>
                        `;
                    });
                    listHtml += `</div>`;
                    tabContent.innerHTML = listHtml;
                }

                else if (activeTab === "dependencies") {
                    const depSpans = trace.spans.filter(s => ['external_http', 'dependency', 'validation', 'effect', 'handler'].includes(s.lane));
                    if (depSpans.length === 0) {
                        tabContent.innerHTML = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No external dependency calls recorded.</div>`;
                        return;
                    }

                    let listHtml = `<div>`;
                    depSpans.forEach((s, idx) => {
                        let laneBadgeColor = 'badge-dep';
                        if (s.lane === 'external_http') laneBadgeColor = 'badge-external';
                        else if (s.lane === 'validation') laneBadgeColor = 'badge-validation';
                        
                        listHtml += `
                            <div class="dep-card">
                                <div class="dep-card-info">
                                    <span class="dep-lane-badge ${laneBadgeColor}">${s.lane}</span>
                                    <div class="dep-label">${escapeHtml(s.label)}</div>
                                    ${s.detail && Object.keys(s.detail).length > 0 ? `
                                        <pre style="background: rgba(11, 19, 38, 0.3); border: 1px solid var(--surface-variant); padding: 8px; border-radius: 2px; font-size: 11px; margin-top: 8px; overflow-x: auto; color: var(--on-surface-variant); font-family: monospace;">${highlightJson(JSON.stringify(s.detail))}</pre>
                                    ` : ''}
                                </div>
                                <div class="dep-duration">${s.duration_ms.toFixed(1)}ms</div>
                            </div>
                        `;
                    });
                    listHtml += `</div>`;
                    tabContent.innerHTML = listHtml;
                }

                else if (activeTab === "exception") {
                    if (!trace.exception) {
                        tabContent.innerHTML = `<div style="text-align: center; padding: 12px; border: 1px dashed var(--surface-variant); border-radius: 2px; opacity: 0.5;">No exceptions occurred.</div>`;
                        return;
                    }

                    const stack = trace.exception.stack_frames.map(f => `File "${f.filename}", line ${f.lineno}, in ${f.name}\n  ${f.line || ''}`).join("\n");

                    tabContent.innerHTML = `
                        <div class="err-card">
                            <span class="err-header-badge">Exception Occurred</span>
                            <h3 class="err-title">${escapeHtml(trace.exception.exception_type)}: ${escapeHtml(trace.exception.message)}</h3>
                            <div class="err-meta">
                                Domain: ${escapeHtml(trace.exception.fault_domain || 'None')} • Code: ${escapeHtml(trace.exception.fault_code || 'None')}
                            </div>
                            <h4 class="err-stack-title">Stack Frame Traceback</h4>
                            <pre class="err-stack">${escapeHtml(stack)}</pre>
                        </div>
                    `;
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        });
    </script>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</body>
</html>
