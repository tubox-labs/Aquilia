{% if total_pages > 1 %}
<div class="pagination">
    {% if page > 1 %}
    <a href="?page={{ page - 1 }}&q={{ search|default('') }}" class="page-btn" aria-label="Previous">
        <i class="icon-chevron-left" style="font-size:15px;"></i>
    </a>
    {% else %}
    <span class="page-btn disabled"><i class="icon-chevron-left" style="font-size:15px;"></i></span>
    {% endif %}

    {% for p in range(1, total_pages + 1) %}
        {% if (p - page)|abs <= 2 or p == 1 or p == total_pages %}
        <a href="?page={{ p }}&q={{ search|default('') }}" class="page-btn {{ 'active' if p == page else '' }}">{{ p }}</a>
        {% elif (p - page)|abs == 3 %}
        <span class="page-btn disabled">…</span>
        {% endif %}
    {% endfor %}

    {% if page < total_pages %}
    <a href="?page={{ page + 1 }}&q={{ search|default('') }}" class="page-btn" aria-label="Next">
        <i class="icon-chevron-right" style="font-size:15px;"></i>
    </a>
    {% else %}
    <span class="page-btn disabled"><i class="icon-chevron-right" style="font-size:15px;"></i></span>
    {% endif %}
</div>
{% endif %}
