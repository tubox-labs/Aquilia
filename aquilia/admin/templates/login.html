<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <meta name="color-scheme" content="dark light">
    <meta name="robots" content="noindex, nofollow">
    <title>Login — {{ site_title|default('Aquilia Admin') }}</title>
    {% if csrf_token %}<meta name="csrf-token" content="{{ csrf_token }}">{% endif %}
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/tubox-labs/Aquilia/master/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <style>
    {% include "partials/css.html" %}

    /* ── Login Spinner ── */
    .login-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:login-spin .6s linear infinite;vertical-align:-2px;}
    @keyframes login-spin{to{transform:rotate(360deg)}}
    .btn-loading{pointer-events:none;opacity:.7;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1 class="gradient-text">{{ site_title|default('Aquilia Admin') }}</h1>
                <p style="font-size:0.78rem;color:var(--text-muted);margin-top:6px;">Sign in to your admin panel</p>
            </div>

            {% if error %}
            <div class="flash flash-error">
                <i class="icon-alert-circle" style="font-size:15px;flex-shrink:0;"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_prefix|default('/admin') }}/login" autocomplete="off">
                {% if csrf_token %}<input type="hidden" name="_csrf_token" value="{{ csrf_token }}">{% endif %}
                <div class="form-group">
                    <label class="form-label" for="username"><i class="icon-user" style="font-size:13px;vertical-align:-1px;margin-right:4px;opacity:0.5;"></i>Username</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password"><i class="icon-lock" style="font-size:13px;vertical-align:-1px;margin-right:4px;opacity:0.5;"></i>Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-primary" type="submit" id="loginBtn" style="width:100%;justify-content:center;padding:11px 0;margin-top:8px;">
                    <i class="icon-log-in" style="font-size:15px;" id="loginIcon"></i> <span id="loginText">Sign In</span>
                </button>
            </form>

            <p style="text-align:center;font-size:0.7rem;color:var(--text-faint);margin-top:24px;">
                Powered by <span style="color:var(--accent);font-weight:500;">Aquilia</span> Framework
            </p>
        </div>
    </div>

    <script>
    (function() {
        const saved = localStorage.getItem('aquilia-admin-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);

        // Login spinner
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = document.getElementById('loginBtn');
                const icon = document.getElementById('loginIcon');
                const text = document.getElementById('loginText');
                if (btn && icon && text) {
                    btn.classList.add('btn-loading');
                    btn.disabled = true;
                    icon.className = '';
                    icon.innerHTML = '<span class="login-spinner"></span>';
                    text.textContent = 'Signing in...';
                }
            });
        }
    })();
    </script>
</body>
</html>
