<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <meta name="color-scheme" content="dark light">
    <meta name="robots" content="noindex, nofollow">
    <title>Login — {{ site_title|default('Aquilia Admin') }}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <style>
    {% include "partials/css.html" %}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1 class="gradient-text">{{ site_title|default('Aquilia Admin') }}</h1>
                <p style="font-size:0.78rem;color:var(--text-muted);margin-top:6px;">Sign in to your admin panel</p>
            </div>

            {% if error %}
            <div class="flash flash-error">
                <i class="icon-alert-circle" style="font-size:15px;flex-shrink:0;"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_prefix|default('/admin') }}/login" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="username"><i class="icon-user" style="font-size:13px;vertical-align:-1px;margin-right:4px;opacity:0.5;"></i>Username</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password"><i class="icon-lock" style="font-size:13px;vertical-align:-1px;margin-right:4px;opacity:0.5;"></i>Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:11px 0;margin-top:8px;">
                    <i class="icon-log-in" style="font-size:15px;"></i> Sign In
                </button>
            </form>

            <p style="text-align:center;font-size:0.7rem;color:var(--text-faint);margin-top:24px;">
                Powered by <span style="color:var(--accent);font-weight:500;">Aquilia</span> Framework
            </p>
        </div>
    </div>

    <script>
    (function() {
        const saved = localStorage.getItem('aquilia-admin-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    </script>
</body>
</html>
