# Base Server Configuration - Shared Across All Environments
# Environment-specific files (dev.yaml, prod.yaml) override these values

server:
  mode: dev
  host: 127.0.0.1
  port: 8000
  reload: false
  workers: 1
  backlog: 2048
  timeout_keep_alive: 5
  timeout_notify: 30
  access_log: true

# ── App Configurations ─────────────────────────────────────────────────
# Per-module config namespaces (accessed via config.apps.<module_name>)
apps:
  auth:
    # Session cleanup settings
    session_cleanup_interval: 3600        # Run cleanup every hour (seconds)
    session_max_idle: 86400               # Max idle time before expiry (24h)
    # Login auditing
    audit_enabled: true
    audit_retention_days: 90              # Keep audit logs for 90 days
    # Token settings
    token_expiry: 3600                    # Access token TTL (1 hour)
    refresh_token_expiry: 604800          # Refresh token TTL (7 days)
    max_login_attempts: 5                 # Lock after N failed attempts
    lockout_duration: 900                 # Account lockout duration (15 min)