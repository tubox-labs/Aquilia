# ──────────────────────────────────────────────────────────────
# Aquilia Docker Compose -- myapp
# Generated by: aq deploy compose
#
# Services:
#   app        -- Aquilia application server
#   nginx      -- Reverse proxy             [profile: proxy]
#
# Usage:
#   docker compose up -d
#   docker compose --profile monitoring up -d
#   docker compose --profile mlops up -d
#   docker compose logs -f app
#   docker compose down -v   (destroy volumes)
# ──────────────────────────────────────────────────────────────


services:

  # ── Aquilia Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: myapp-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AQUILIA_ENV: production
      AQUILIA_MODE: prod
      AQ_SERVER_HOST: "0.0.0.0"
      AQ_SERVER_PORT: "8000"
      AQ_SERVER_WORKERS: "4"
      DATABASE_URL: "sqlite:///data/db.sqlite3"
    env_file:
      - .env
    volumes:
      - ./:/app
      - app-data:/app/data
      - app-artifacts:/app/artifacts
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - myapp-net

  # ── Nginx Reverse Proxy (enable with --profile proxy) ──
  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    profiles:
      - proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/nginx-health']
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - myapp-net

# ── Networks ──
networks:
  myapp-net:
    driver: bridge

# ── Volumes ──
volumes:
  app-data:
  app-artifacts:
