name: "Conflict detector"
on:
  push:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [synchronize]

permissions: {}

jobs:
  main:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if PRs have merge conflicts
        uses: eps1lon/actions-label-merge-conflict@d5ebf66048cf1919ef49bed4e46df507a76aefc0 # v3.0.2
        with:
          dirtyLabel: "conflicting"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
