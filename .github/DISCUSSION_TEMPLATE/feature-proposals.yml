labels: [idea, enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ### Propose a New Capability for Aquilia 💡
        
        Aquilia is designed to be highly extensible, type-safe, and secure. We welcome ideas to improve our core subsystems: the DI container, ORM, blueprint engine, worker schedules, faults middleware, or ASGI adapter.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: |
        What limitation or challenge do you currently face in Aquilia? 
        Provide a clear explanation of the friction point, including current workarounds if any.
      placeholder: |
        Currently, when working with background workers...
    validations:
      required: true
  - type: textarea
    id: proposed-api-design
    attributes:
      label: Proposed Solution & API Design
      description: |
        Describe your proposed design. Showing a mock-up of the target developer experience (API usage, decorators, signatures) is highly encouraged.
      placeholder: |
        # Proposed new decorator or interface configuration:
        @task(scheduler="cron", expression="0 0 * * *")
        async def daily_cleanup():
            pass
      render: python
    validations:
      required: true
  - type: textarea
    id: subsystem-impact
    attributes:
      label: Subsystem Impact & Trade-offs
      description: |
        How does this proposal interact with existing Aquilia subsystems (e.g. does it require middleware changes, DI container updates, ORM modifications)?
        Detail any performance, safety, or backward-compatibility trade-offs.
      placeholder: |
        This change would only affect the task worker scheduler...
    validations:
      required: true
  - type: checkboxes
    id: contribution-interest
    attributes:
      label: Implementation Contribution
      options:
        - label: I am interested in contributing code to implement this feature.
