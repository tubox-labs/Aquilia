labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        ### Welcome to the Aquilia Community! 🦅
        
        Before submitting your question, please take a moment to ensure all initial debugging steps have been completed. Having structured context helps other developers and maintainers diagnose your issue efficiently.
  - type: checkboxes
    id: pre-checks
    attributes:
      label: Diagnostic Checklist
      description: Please verify that you have completed the following steps before submitting:
      options:
        - label: I searched the GitHub issues, past discussions, and repository documentation (GUIDE.md / README.md) for similar topics.
          required: true
        - label: I checked the Dependency Injection (DI) graph resolution diagnostics if this relates to provider wiring.
          required: false
        - label: I inspected the active Fault domain, error code, and metadata payload if an Aquilia Fault was raised.
          required: false
        - label: I verified my database adapter configuration and credentials if this is an ORM/database connection issue.
          required: false
  - type: textarea
    id: reproducible-example
    attributes:
      label: Minimal Reproducible Example
      description: |
        Please provide a self-contained, minimal code snippet that reproduces the issue or demonstrates what you are trying to achieve. 
        Use complete imports and mock data if possible.
      placeholder: |
        from aquilia.blueprints import Blueprint, ward
        from aquilia.controller import Controller, route
        from aquilia.response import Response

        # Define a minimal Blueprint, Controller, or Task
        class InputSpec(Blueprint):
            name: str

            @ward
            def validate_name(self, data):
                if len(data.name) < 3:
                    self.reject("name", "Too short")

        class HelloController(Controller):
            @route("/hello", methods=["POST"])
            async def hello(self, spec: InputSpec) -> Response:
                return Response.json({"message": f"Hello, {spec.name}!"})
      render: python
    validations:
      required: true
  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description & Expected Behavior
      description: |
        Detail what you are attempting to build, what currently happens (include traceback/logs if applicable), and what you expect the framework to do.
      placeholder: |
        1. Start the ASGI server with the controller registered.
        2. Send a POST request to `/hello` with JSON payload `{"name": "ab"}`.
        3. Expect a validation fault `BP101` with field rejection details.
        4. Actual behavior: ...
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment Info
      multiple: true
      options:
        - Python 3.10
        - Python 3.11
        - Python 3.12
        - Python 3.13
        - OS: Linux
        - OS: macOS
        - OS: Windows
    validations:
      required: true
  - type: textarea
    id: additional-details
    attributes:
      label: Additional Context
      description: Attach any other details, like screenshots, active middleware list, third-party libraries involved, or deployment environment settings.
