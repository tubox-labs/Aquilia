<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 330" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1460" height="330" class="bg" />
  <rect width="1458" height="328" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Middleware Chain Execution Flow</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="20" y="160" width="150" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="20" y="160" width="4" height="90" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="36" y="184" class="node-text-title">ASGI Request</text>
    
    <!-- Description -->
    <text x="36" y="202" class="node-text-desc">Client initiates</text><text x="36" y="217" class="node-text-desc">HTTP connection</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="36" y="228" width="58" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="65.0" y="238" text-anchor="middle">INCOMING</text>
        
  </g>

  <g>
    <rect x="190" y="100" width="900" height="200" class="group-rect" />
    <text x="205" y="92" class="group-label">MIDDLEWARE EXECUTION PIPELINE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="205" y="140" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="205" y="140" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="221" y="164" class="node-text-title">CORS / CSP Guard</text>
    
    <!-- Description -->
    <text x="221" y="182" class="node-text-desc">Security policy</text><text x="221" y="197" class="node-text-desc">headers check</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="221" y="208" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="247.0" y="218" text-anchor="middle">PRIO 10</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="380" y="140" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="380" y="140" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="396" y="164" class="node-text-title">Request ID</text>
    
    <!-- Description -->
    <text x="396" y="182" class="node-text-desc">Assigns unique</text><text x="396" y="197" class="node-text-desc">trace ID to ctx</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="396" y="208" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="422.0" y="218" text-anchor="middle">PRIO 20</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="555" y="140" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="555" y="140" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="571" y="164" class="node-text-title">Session Manager</text>
    
    <!-- Description -->
    <text x="571" y="182" class="node-text-desc">Loads session</text><text x="571" y="197" class="node-text-desc">cryptographic state</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="571" y="208" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="597.0" y="218" text-anchor="middle">PRIO 30</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="730" y="140" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="730" y="140" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="746" y="164" class="node-text-title">Auth Guard</text>
    
    <!-- Description -->
    <text x="746" y="182" class="node-text-desc">Verifies token;</text><text x="746" y="197" class="node-text-desc">binds Identity</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="746" y="208" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="772.0" y="218" text-anchor="middle">PRIO 40</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="905" y="140" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="905" y="140" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="921" y="164" class="node-text-title">Telemetry Tracer</text>
    
    <!-- Description -->
    <text x="921" y="182" class="node-text-desc">Starts distributed</text><text x="921" y="197" class="node-text-desc">tracing span</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="921" y="208" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="947.0" y="218" text-anchor="middle">PRIO 50</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1110" y="160" width="160" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="1110" y="160" width="4" height="90" rx="2" fill="url(#emeraldGrad)" />
    
    <!-- Title -->
    <text x="1126" y="184" class="node-text-title">Controller Router</text>
    
    <!-- Description -->
    <text x="1126" y="202" class="node-text-desc">Matches route;</text><text x="1126" y="217" class="node-text-desc">runs FlowPipeline</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1126" y="228" width="70" height="14" fill="url(#emeraldGrad)" />
    <text class="badge-text" x="1161.0" y="238" text-anchor="middle">CONTROLLER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1290" y="160" width="150" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="1290" y="160" width="4" height="90" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="1306" y="184" class="node-text-title">ASGI Response</text>
    
    <!-- Description -->
    <text x="1306" y="202" class="node-text-desc">Returns response</text><text x="1306" y="217" class="node-text-desc">to target client</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1306" y="228" width="58" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="1335.0" y="238" text-anchor="middle">OUTGOING</text>
        
  </g>
<line x1="170" y1="185" x2="205" y2="185" class="connection-line" />
<line x1="365" y1="185" x2="380" y2="185" class="connection-line" />
<line x1="540" y1="185" x2="555" y2="185" class="connection-line" />
<line x1="715" y1="185" x2="730" y2="185" class="connection-line" />
<line x1="890" y1="185" x2="905" y2="185" class="connection-line" />
<line x1="1065" y1="185" x2="1110" y2="185" class="connection-line" />
<line x1="1270" y1="185" x2="1290" y2="185" class="connection-line" />
<line x1="1110" y1="225" x2="1065" y2="225" class="connection-dashed" />
<line x1="905" y1="225" x2="890" y2="225" class="connection-dashed" />
<line x1="730" y1="225" x2="715" y2="225" class="connection-dashed" />
<line x1="555" y1="225" x2="540" y2="225" class="connection-dashed" />
<line x1="380" y1="225" x2="365" y2="225" class="connection-dashed" />
<line x1="205" y1="225" x2="170" y2="225" class="connection-dashed" />
</svg>