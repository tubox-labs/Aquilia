<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 270" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1140" height="270" class="bg" />
  <rect width="1138" height="268" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Lifespan and Hook Orchestration</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="30" y="140" width="240" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="30" y="140" width="4" height="95" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="46" y="164" class="node-text-title">ASGI Startup (Lifespan)</text>
    
    <!-- Description -->
    <text x="46" y="182" class="node-text-desc">Invoked by ASGI server;</text><text x="46" y="197" class="node-text-desc">loads AppManifest;</text><text x="46" y="212" class="node-text-desc">starts boot orchestration</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="46" y="213" width="52" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="72.0" y="223" text-anchor="middle">STARTUP</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="310" y="140" width="240" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="310" y="140" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="326" y="164" class="node-text-title">Subsystem Init (Lifecycle)</text>
    
    <!-- Description -->
    <text x="326" y="182" class="node-text-desc">Initializes DB connections,</text><text x="326" y="197" class="node-text-desc">Cache backends, Storage,</text><text x="326" y="212" class="node-text-desc">OTel tracer, Task workers</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="326" y="213" width="94" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="373.0" y="223" text-anchor="middle">INITIALIZATION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="590" y="140" width="240" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="590" y="140" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="606" y="164" class="node-text-title">Request Context Hooks</text>
    
    <!-- Description -->
    <text x="606" y="182" class="node-text-desc">Executes pre-request hooks;</text><text x="606" y="197" class="node-text-desc">binds context; resolves</text><text x="606" y="212" class="node-text-desc">request-scoped DI graphs</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="606" y="213" width="82" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="647.0" y="223" text-anchor="middle">RUNTIME WORK</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="870" y="140" width="240" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="870" y="140" width="4" height="95" rx="2" fill="url(#roseGrad)" />
    
    <!-- Title -->
    <text x="886" y="164" class="node-text-title">ASGI Shutdown (Lifespan)</text>
    
    <!-- Description -->
    <text x="886" y="182" class="node-text-desc">Invoked on server stop;</text><text x="886" y="197" class="node-text-desc">triggers cleanup hooks;</text><text x="886" y="212" class="node-text-desc">finalizes service pools</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="886" y="213" width="58" height="14" fill="url(#roseGrad)" />
    <text class="badge-text" x="915.0" y="223" text-anchor="middle">SHUTDOWN</text>
        
  </g>
<line x1="270" y1="185" x2="310" y2="185" class="connection-line" />
<line x1="550" y1="185" x2="590" y2="185" class="connection-line" />
<line x1="830" y1="185" x2="870" y2="185" class="connection-line" />
</svg>