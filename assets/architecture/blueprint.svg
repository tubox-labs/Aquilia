<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 270" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1260" height="270" class="bg" />
  <rect width="1258" height="268" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Blueprint Validation and Data Molding Engine</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="30" y="140" width="200" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="30" y="140" width="4" height="95" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="46" y="164" class="node-text-title">Raw Request Payload</text>
    
    <!-- Description -->
    <text x="46" y="182" class="node-text-desc">Incoming JSON, Form,</text><text x="46" y="197" class="node-text-desc">or Query parameters</text><text x="46" y="212" class="node-text-desc">from ASGI adapter</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="46" y="213" width="58" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="75.0" y="223" text-anchor="middle">1. INPUT</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="260" y="140" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="260" y="140" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="276" y="164" class="node-text-title">validate_body Decorator</text>
    
    <!-- Description -->
    <text x="276" y="182" class="node-text-desc">Intercepts route call;</text><text x="276" y="197" class="node-text-desc">binds Blueprint schema</text><text x="276" y="212" class="node-text-desc">to request context</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="276" y="213" width="70" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="311.0" y="223" text-anchor="middle">2. BINDING</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="510" y="140" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="510" y="140" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="526" y="164" class="node-text-title">Facet Parsing and Casting</text>
    
    <!-- Description -->
    <text x="526" y="182" class="node-text-desc">Evaluates facet types</text><text x="526" y="197" class="node-text-desc">(IntFacet, EmailFacet,</text><text x="526" y="212" class="node-text-desc">etc.); applies constraints</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="526" y="213" width="88" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="570.0" y="223" text-anchor="middle">3. VALIDATION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="760" y="140" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="760" y="140" width="4" height="95" rx="2" fill="url(#emeraldGrad)" />
    
    <!-- Title -->
    <text x="776" y="164" class="node-text-title">Molded Blueprint Instance</text>
    
    <!-- Description -->
    <text x="776" y="182" class="node-text-desc">Typed object initialized;</text><text x="776" y="197" class="node-text-desc">passed as parameter</text><text x="776" y="212" class="node-text-desc">to controller method</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="776" y="213" width="88" height="14" fill="url(#emeraldGrad)" />
    <text class="badge-text" x="820.0" y="223" text-anchor="middle">4. RESOLUTION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1010" y="140" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="1010" y="140" width="4" height="95" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="1026" y="164" class="node-text-title">Lens / Projection</text>
    
    <!-- Description -->
    <text x="1026" y="182" class="node-text-desc">Response filtering;</text><text x="1026" y="197" class="node-text-desc">excludes WriteOnly fields;</text><text x="1026" y="212" class="node-text-desc">computes custom properties</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1026" y="213" width="64" height="14" fill="url(#violetGrad)" />
    <text class="badge-text" x="1058.0" y="223" text-anchor="middle">5. OUTPUT</text>
        
  </g>
<line x1="230" y1="185" x2="260" y2="185" class="connection-line" />
<line x1="480" y1="185" x2="510" y2="185" class="connection-line" />
<line x1="720" y1="185" x2="760" y2="185" class="connection-line" />
<line x1="980" y1="185" x2="1010" y2="185" class="connection-line" />
</svg>