<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 270" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Handdrawn/Sketch Filter -->
    <filter id="handdrawn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Flat Pastel Gradients for Hand-Drawn Vibe -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;display=swap');

    .bg { fill: #f9fafb; rx: 12px; }
    .border-stroke { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: -0.01em; }
    
    /* Card Styles */
    .card-bg { stroke: #1e293b; stroke-width: 2; rx: 6px; }
    .node-text-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .node-text-desc { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 11.5px; fill: #334155; font-weight: 600; line-height: 1.4; }
    
    /* Group Styles */
    .group-rect { rx: 10px; fill: #f3f4f6; stroke: #475569; stroke-dasharray: 6 6; stroke-width: 1.8; }
    .group-label { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.05em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #1e293b; stroke-width: 2.2; }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 5 5; }
    .connection-error { fill: none; stroke: #e11d48; stroke-width: 2.2; stroke-dasharray: 4 4; }
    
    /* Badges */
    .badge-rect { rx: 4px; fill: #334155; }
    .badge-text { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1260" height="270" class="bg" />
  <rect width="1258" height="268" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Contract Validation and Data Molding Engine</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="30" y="140" width="200" height="95" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" />
    
    <!-- Title -->
    <text x="46" y="164" class="node-text-title">Raw Request Payload</text>
    
    <!-- Description -->
    <text x="46" y="182" class="node-text-desc">Incoming JSON, Form,</text><text x="46" y="197" class="node-text-desc">or Query parameters</text><text x="46" y="212" class="node-text-desc">from ASGI adapter</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="154" y="154" width="60" height="14" />
    <text class="badge-text" x="184.0" y="164" text-anchor="middle">1. INPUT</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="260" y="140" width="220" height="95" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" />
    
    <!-- Title -->
    <text x="276" y="164" class="node-text-title">validate_body Decorator</text>
    
    <!-- Description -->
    <text x="276" y="182" class="node-text-desc">Intercepts route call;</text><text x="276" y="197" class="node-text-desc">binds Contract schema</text><text x="276" y="212" class="node-text-desc">to request context</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="392" y="154" width="72" height="14" />
    <text class="badge-text" x="428.0" y="164" text-anchor="middle">2. BINDING</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="510" y="140" width="220" height="95" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" />
    
    <!-- Title -->
    <text x="526" y="164" class="node-text-title">Facet Parsing and Casting</text>
    
    <!-- Description -->
    <text x="526" y="182" class="node-text-desc">Evaluates facet types</text><text x="526" y="197" class="node-text-desc">(IntFacet, EmailFacet,</text><text x="526" y="212" class="node-text-desc">etc.); applies constraints</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="624" y="154" width="90" height="14" />
    <text class="badge-text" x="669.0" y="164" text-anchor="middle">3. VALIDATION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="760" y="140" width="220" height="95" class="card-bg" fill="url(#emeraldGrad)" filter="url(#handdrawn)" />
    
    <!-- Title -->
    <text x="776" y="164" class="node-text-title">Molded Contract Instance</text>
    
    <!-- Description -->
    <text x="776" y="182" class="node-text-desc">Typed object initialized;</text><text x="776" y="197" class="node-text-desc">passed as parameter</text><text x="776" y="212" class="node-text-desc">to controller method</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="874" y="154" width="90" height="14" />
    <text class="badge-text" x="919.0" y="164" text-anchor="middle">4. RESOLUTION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1010" y="140" width="220" height="95" class="card-bg" fill="url(#violetGrad)" filter="url(#handdrawn)" />
    
    <!-- Title -->
    <text x="1026" y="164" class="node-text-title">Lens / Projection</text>
    
    <!-- Description -->
    <text x="1026" y="182" class="node-text-desc">Response filtering;</text><text x="1026" y="197" class="node-text-desc">excludes WriteOnly fields;</text><text x="1026" y="212" class="node-text-desc">computes custom properties</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1148" y="154" width="66" height="14" />
    <text class="badge-text" x="1181.0" y="164" text-anchor="middle">5. OUTPUT</text>
        
  </g>
<line x1="230" y1="185" x2="260" y2="185" class="connection-line" filter="url(#handdrawn)" /><path d="M 260 185 L 250.0 190.0 L 250.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<line x1="480" y1="185" x2="510" y2="185" class="connection-line" filter="url(#handdrawn)" /><path d="M 510 185 L 500.0 190.0 L 500.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<line x1="720" y1="185" x2="760" y2="185" class="connection-line" filter="url(#handdrawn)" /><path d="M 760 185 L 750.0 190.0 L 750.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<line x1="980" y1="185" x2="1010" y2="185" class="connection-line" filter="url(#handdrawn)" /><path d="M 1010 185 L 1000.0 190.0 L 1000.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
</svg>