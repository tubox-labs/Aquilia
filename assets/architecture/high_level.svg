<line x1="790" y1="280" x2="850" y2="280" class="connection-line" filter="url(#handdrawn)" /><path d="M 850 280 L 840.0 285.0 L 840.0 275.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
</svg>