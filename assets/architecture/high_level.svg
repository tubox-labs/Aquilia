<line x1="550" y1="165" x2="570" y2="165" class="connection-line" filter="url(#handdrawn)" /><path d="M 570 165 L 560.0 170.0 L 560.0 160.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
