<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1100" height="600" class="bg" />
  <rect width="1098" height="598" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia High-Level System Architecture</text>
  </g>
  
  
  <g>
    <rect x="20" y="90" width="260" height="480" class="group-rect" />
    <text x="35" y="82" class="group-label">DEVELOPMENT AND CLI SOURCE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="120" width="220" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="120" width="4" height="90" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="56" y="144" class="node-text-title">Developer Code</text>
    
    <!-- Description -->
    <text x="56" y="162" class="node-text-desc">Writes Controllers, Services,</text><text x="56" y="177" class="node-text-desc">workspace.py, manifest.py</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="56" y="188" width="40" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="76.0" y="198" text-anchor="middle">INPUT</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="250" width="220" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="250" width="4" height="90" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="56" y="274" class="node-text-title">Aquilia CLI (aq)</text>
    
    <!-- Description -->
    <text x="56" y="292" class="node-text-desc">aq init, aq add, aq serve,</text><text x="56" y="307" class="node-text-desc">aq compile, aq deploy</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="56" y="318" width="28" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="70.0" y="328" text-anchor="middle">CLI</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="380" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="380" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="56" y="404" class="node-text-title">Package Scanner</text>
    
    <!-- Description -->
    <text x="56" y="422" class="node-text-desc">Auto-discovers manifests</text><text x="56" y="437" class="node-text-desc">and registers workspace</text><text x="56" y="452" class="node-text-desc">modules dynamically</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="56" y="453" width="64" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="88.0" y="463" text-anchor="middle">DISCOVERY</text>
        
  </g>

  <g>
    <rect x="310" y="90" width="500" height="480" class="group-rect" />
    <text x="325" y="82" class="group-label">AQUILIA ENGINE (ASGI RUNTIME)</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="330" y="120" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="330" y="120" width="4" height="95" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="346" y="144" class="node-text-title">AquiliaRuntime</text>
    
    <!-- Description -->
    <text x="346" y="162" class="node-text-desc">Linear Boot Phase Manager</text><text x="346" y="177" class="node-text-desc">Created -> Discovering -></text><text x="346" y="192" class="node-text-desc">Bootstrapping -> Ready</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="346" y="193" width="64" height="14" fill="url(#violetGrad)" />
    <text class="badge-text" x="378.0" y="203" text-anchor="middle">LIFECYCLE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="570" y="120" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="570" y="120" width="4" height="95" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="586" y="144" class="node-text-title">AquiliaServer</text>
    
    <!-- Description -->
    <text x="586" y="162" class="node-text-desc">Main ASGI callable</text><text x="586" y="177" class="node-text-desc">Initializes AppRegistry,</text><text x="586" y="192" class="node-text-desc">Router and middleware</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="586" y="193" width="76" height="14" fill="url(#violetGrad)" />
    <text class="badge-text" x="624.0" y="203" text-anchor="middle">CORE SERVER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="330" y="270" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="330" y="270" width="4" height="95" rx="2" fill="url(#emeraldGrad)" />
    
    <!-- Title -->
    <text x="346" y="294" class="node-text-title">DI Container</text>
    
    <!-- Description -->
    <text x="346" y="312" class="node-text-desc">Manages dependencies,</text><text x="346" y="327" class="node-text-desc">instantiates providers,</text><text x="346" y="342" class="node-text-desc">handles scoped DAGs</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="346" y="343" width="82" height="14" fill="url(#emeraldGrad)" />
    <text class="badge-text" x="387.0" y="353" text-anchor="middle">DI CONTAINER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="570" y="270" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="570" y="270" width="4" height="95" rx="2" fill="url(#amberGrad)" />
    
    <!-- Title -->
    <text x="586" y="294" class="node-text-title">Flow Pipeline</text>
    
    <!-- Description -->
    <text x="586" y="312" class="node-text-desc">Executes composed route</text><text x="586" y="327" class="node-text-desc">steps: Guards -> Transforms</text><text x="586" y="342" class="node-text-desc">-> Handler -> Hooks</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="586" y="343" width="58" height="14" fill="url(#amberGrad)" />
    <text class="badge-text" x="615.0" y="353" text-anchor="middle">PIPELINE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="330" y="410" width="460" height="135" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="330" y="410" width="4" height="135" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="346" y="434" class="node-text-title">Subsystem Integrations</text>
    
    <!-- Description -->
    <text x="346" y="452" class="node-text-desc">Database ORM (SQLite / PG)  |  Cache Services (Redis / Memory)</text><text x="346" y="467" class="node-text-desc">Storage Engines (S3 / SFTP) |  Template Mailer and I18n Engine</text><text x="346" y="482" class="node-text-desc">OpenTelemetry Tracer        |  Sockets (WS Realtime)</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="346" y="523" width="58" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="375.0" y="533" text-anchor="middle">SERVICES</text>
        
  </g>

  <g>
    <rect x="840" y="90" width="240" height="480" class="group-rect" />
    <text x="855" y="82" class="group-label">PRODUCTION INFRASTRUCTURE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="850" y="120" width="220" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="850" y="120" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="866" y="144" class="node-text-title">Docker Integration</text>
    
    <!-- Description -->
    <text x="866" y="162" class="node-text-desc">Automated production</text><text x="866" y="177" class="node-text-desc">Dockerfile scaffolding</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="866" y="183" width="40" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="886.0" y="193" text-anchor="middle">INFRA</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="850" y="240" width="220" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="850" y="240" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="866" y="264" class="node-text-title">Compose Config</text>
    
    <!-- Description -->
    <text x="866" y="282" class="node-text-desc">Database, Cache, and</text><text x="866" y="297" class="node-text-desc">API services configuration</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="866" y="303" width="52" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="892.0" y="313" text-anchor="middle">COMPOSE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="850" y="360" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="850" y="360" width="4" height="95" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="866" y="384" class="node-text-title">Render Provider</text>
    
    <!-- Description -->
    <text x="866" y="402" class="node-text-desc">Auto-deploys codebase to</text><text x="866" y="417" class="node-text-desc">Render cloud workspace</text><text x="866" y="432" class="node-text-desc">via credentials store</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="866" y="433" width="70" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="901.0" y="443" text-anchor="middle">DEPLOYMENT</text>
        
  </g>
<line x1="260" y1="165" x2="330" y2="165" class="connection-line" /><text x="295.0" y="157.0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10px" font-weight="600" fill="#94a3b8">Config and Code</text>
<line x1="150" y1="210" x2="150" y2="250" class="connection-line" />
<path d="M 260 295 L 295.0 295 L 295.0 165 L 330 165" class="connection-line" />
<line x1="150" y1="340" x2="150" y2="380" class="connection-line" />
<line x1="260" y1="425" x2="330" y2="455" class="connection-dashed" /><text x="295.0" y="432.0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10px" font-weight="600" fill="#94a3b8">Register modules</text>
<line x1="550" y1="165" x2="570" y2="165" class="connection-line" />
<line x1="440" y1="215" x2="440" y2="270" class="connection-line" />
<line x1="680" y1="215" x2="680" y2="270" class="connection-line" />
<line x1="550" y1="315" x2="570" y2="315" class="connection-line" /><text x="560.0" y="307.0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10px" font-weight="600" fill="#94a3b8">Injects</text>
<line x1="440" y1="365" x2="440" y2="410" class="connection-line" />
<line x1="680" y1="365" x2="680" y2="410" class="connection-line" />
<path d="M 790 475 L 820.0 475 L 820.0 410 L 850 410" class="connection-line" />
<line x1="790" y1="165" x2="850" y2="165" class="connection-line" />
<line x1="790" y1="280" x2="850" y2="280" class="connection-line" />
</svg>