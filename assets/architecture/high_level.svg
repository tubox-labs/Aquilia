<line x1="680" y1="365" x2="680" y2="410" class="connection-line" filter="url(#handdrawn)" /><path d="M 680 410 L 675.0 400.0 L 685.0 400.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
