<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="980" height="480" class="bg" />
  <rect width="978" height="478" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Flow Pipeline and Effect Orchestration</text>
  </g>
  
  
  <g>
    <rect x="20" y="100" width="520" height="360" class="group-rect" />
    <text x="35" y="92" class="group-label">FLOWPIPELINE EXECUTION NODES</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="140" width="220" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="140" width="4" height="95" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="56" y="164" class="node-text-title">1. Guard Nodes</text>
    
    <!-- Description -->
    <text x="56" y="182" class="node-text-desc">ClearanceGuard / RequireAuth</text><text x="56" y="197" class="node-text-desc">verifies request permissions</text><text x="56" y="212" class="node-text-desc">and short-circuits if forbidden</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="56" y="213" width="58" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="85.0" y="223" text-anchor="middle">SECURITY</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="255" width="220" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="255" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="56" y="279" class="node-text-title">2. Transform Nodes</text>
    
    <!-- Description -->
    <text x="56" y="297" class="node-text-desc">Transforms input body;</text><text x="56" y="312" class="node-text-desc">molds typed blueprints</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="355" width="220" height="90" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="40" y="355" width="4" height="90" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="56" y="379" class="node-text-title">3. Handler Node</text>
    
    <!-- Description -->
    <text x="56" y="397" class="node-text-desc">Controller action execution;</text><text x="56" y="412" class="node-text-desc">business logic execution</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="56" y="423" width="46" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="79.0" y="433" text-anchor="middle">ACTION</text>
        
  </g>

  <g>
    <rect x="580" y="100" width="380" height="360" class="group-rect" />
    <text x="595" y="92" class="group-label">EFFECTSCOPE MANAGEMENT</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="140" width="340" height="105" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="600" y="140" width="4" height="105" rx="2" fill="url(#amberGrad)" />
    
    <!-- Title -->
    <text x="616" y="164" class="node-text-title">4. Effect Requirements (@requires)</text>
    
    <!-- Description -->
    <text x="616" y="182" class="node-text-desc">Handler declares: @requires(DBTx['write'], Cache['user'])</text><text x="616" y="197" class="node-text-desc">Acquires matching database transaction and cache</text><text x="616" y="212" class="node-text-desc">namespace resources from registry</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="616" y="223" width="52" height="14" fill="url(#amberGrad)" />
    <text class="badge-text" x="642.0" y="233" text-anchor="middle">ACQUIRE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="260" width="340" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="600" y="260" width="4" height="85" rx="2" fill="url(#amberGrad)" />
    
    <!-- Title -->
    <text x="616" y="284" class="node-text-title">5. Provider Allocation</text>
    
    <!-- Description -->
    <text x="616" y="302" class="node-text-desc">EffectProvider resolves connection pool / client;</text><text x="616" y="317" class="node-text-desc">binds resource reference to FlowContext.effects</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="360" width="340" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="600" y="360" width="4" height="85" rx="2" fill="url(#emeraldGrad)" />
    
    <!-- Title -->
    <text x="616" y="384" class="node-text-title">6. Resource Release and Commit</text>
    
    <!-- Description -->
    <text x="616" y="402" class="node-text-desc">Concludes flow; commits DB changes;</text><text x="616" y="417" class="node-text-desc">releases resource handles back to pool</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="616" y="423" width="52" height="14" fill="url(#emeraldGrad)" />
    <text class="badge-text" x="642.0" y="433" text-anchor="middle">RELEASE</text>
        
  </g>
<line x1="260" y1="185" x2="280" y2="295" class="connection-line" />
<line x1="260" y1="295" x2="280" y2="395" class="connection-line" />
<path d="M 260 395 L 430.0 395 L 430.0 190 L 600 190" class="connection-line" /><text x="430.0" y="284.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10px" font-weight="600" fill="#94a3b8">Declares</text>
<line x1="770" y1="245" x2="770" y2="260" class="connection-line" />
<line x1="770" y1="345" x2="770" y2="360" class="connection-line" />
</svg>