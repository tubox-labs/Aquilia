<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #070a13; rx: 12px; }
    .border-stroke { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #f8fafc; letter-spacing: -0.02em; }
    
    /* Card Styles */
    .card-bg { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 8px; filter: url(#shadow); transition: stroke 0.2s ease; }
    .card-bg:hover { stroke: #38bdf8; }
    .node-text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .node-text-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94a3b8; }
    
    /* Group Styles */
    .group-rect { rx: 12px; fill: #090d16; stroke: #1e293b; stroke-dasharray: 6 6; stroke-width: 1.5; }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 0.08em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #38bdf8; stroke-width: 1.8; marker-end: url(#arrow); }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#arrowMuted); }
    .connection-error { fill: none; stroke: #fb7185; stroke-width: 1.8; stroke-dasharray: 3 3; marker-end: url(#arrowRose); }
    
    /* Badges */
    .badge-rect { rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1050" height="480" class="bg" />
  <rect width="1048" height="478" x="1" y="1" class="border-stroke" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Dependency Injection Engine Architecture</text>
  </g>
  
  
  <g>
    <rect x="20" y="100" width="240" height="360" class="group-rect" />
    <text x="35" y="92" class="group-label">1. DISCOVERY AND DECL.</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="130" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="35" y="130" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="51" y="154" class="node-text-title">@service Decorator</text>
    
    <!-- Description -->
    <text x="51" y="172" class="node-text-desc">Marks class as a DI</text><text x="51" y="187" class="node-text-desc">injectable service</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="51" y="193" width="70" height="14" fill="url(#slateGrad)" />
    <text class="badge-text" x="86.0" y="203" text-anchor="middle">ANNOTATION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="230" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="35" y="230" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="51" y="254" class="node-text-title">@factory Decorator</text>
    
    <!-- Description -->
    <text x="51" y="272" class="node-text-desc">Marks method returning</text><text x="51" y="287" class="node-text-desc">custom value/provider</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="330" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="35" y="330" width="4" height="85" rx="2" fill="url(#slateGrad)" />
    
    <!-- Title -->
    <text x="51" y="354" class="node-text-title">Manifest Decl.</text>
    
    <!-- Description -->
    <text x="51" y="372" class="node-text-desc">Manual list in AppManifest</text><text x="51" y="387" class="node-text-desc">services array</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <rect x="290" y="100" width="240" height="360" class="group-rect" />
    <text x="305" y="92" class="group-label">2. PROVIDER REGISTRY</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="130" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="305" y="130" width="4" height="85" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="321" y="154" class="node-text-title">ClassProvider</text>
    
    <!-- Description -->
    <text x="321" y="172" class="node-text-desc">Instantiates target</text><text x="321" y="187" class="node-text-desc">class when resolved</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="321" y="193" width="58" height="14" fill="url(#blueGrad)" />
    <text class="badge-text" x="350.0" y="203" text-anchor="middle">PROVIDER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="230" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="305" y="230" width="4" height="85" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="321" y="254" class="node-text-title">FactoryProvider</text>
    
    <!-- Description -->
    <text x="321" y="272" class="node-text-desc">Invokes factory function</text><text x="321" y="287" class="node-text-desc">with dynamic params</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="330" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="305" y="330" width="4" height="85" rx="2" fill="url(#blueGrad)" />
    
    <!-- Title -->
    <text x="321" y="354" class="node-text-title">ValueProvider</text>
    
    <!-- Description -->
    <text x="321" y="372" class="node-text-desc">Wraps raw configured</text><text x="321" y="387" class="node-text-desc">objects / secrets</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <rect x="560" y="100" width="240" height="360" class="group-rect" />
    <text x="575" y="92" class="group-label">3. CONTAINER AND SCOPES</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="130" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="575" y="130" width="4" height="85" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="591" y="154" class="node-text-title">Singleton Scope</text>
    
    <!-- Description -->
    <text x="591" y="172" class="node-text-desc">Shared across the entire</text><text x="591" y="187" class="node-text-desc">runtime lifetime</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="591" y="193" width="46" height="14" fill="url(#violetGrad)" />
    <text class="badge-text" x="614.0" y="203" text-anchor="middle">GLOBAL</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="230" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="575" y="230" width="4" height="85" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="591" y="254" class="node-text-title">App Scope</text>
    
    <!-- Description -->
    <text x="591" y="272" class="node-text-desc">Bound to the server</text><text x="591" y="287" class="node-text-desc">bootstrap instance</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="330" width="210" height="85" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="575" y="330" width="4" height="85" rx="2" fill="url(#violetGrad)" />
    
    <!-- Title -->
    <text x="591" y="354" class="node-text-title">Request Scope</text>
    
    <!-- Description -->
    <text x="591" y="372" class="node-text-desc">Instantiated and destroyed</text><text x="591" y="387" class="node-text-desc">per HTTP/WS connection</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="591" y="393" width="64" height="14" fill="url(#violetGrad)" />
    <text class="badge-text" x="623.0" y="403" text-anchor="middle">TRANSIENT</text>
        
  </g>

  <g>
    <rect x="830" y="100" width="240" height="360" class="group-rect" />
    <text x="845" y="92" class="group-label">4. RESOLUTION ENGINE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="845" y="130" width="210" height="105" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="845" y="130" width="4" height="105" rx="2" fill="url(#emeraldGrad)" />
    
    <!-- Title -->
    <text x="861" y="154" class="node-text-title">Topological Sorting</text>
    
    <!-- Description -->
    <text x="861" y="172" class="node-text-desc">Calculates compilation</text><text x="861" y="187" class="node-text-desc">order; resolves service</text><text x="861" y="202" class="node-text-desc">dependencies first</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="861" y="213" width="70" height="14" fill="url(#emeraldGrad)" />
    <text class="badge-text" x="896.0" y="223" text-anchor="middle">AST ENGINE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="845" y="260" width="210" height="95" class="card-bg" />
    
    <!-- Accent Left Line -->
    <rect x="845" y="260" width="4" height="95" rx="2" fill="url(#roseGrad)" />
    
    <!-- Title -->
    <text x="861" y="284" class="node-text-title">DI Diagnostics</text>
    
    <!-- Description -->
    <text x="861" y="302" class="node-text-desc">Performs dry-run checks;</text><text x="861" y="317" class="node-text-desc">detects cyclical dependencies</text><text x="861" y="332" class="node-text-desc">and raises errors</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="861" y="333" width="70" height="14" fill="url(#roseGrad)" />
    <text class="badge-text" x="896.0" y="343" text-anchor="middle">VALIDATION</text>
        
  </g>
<line x1="245" y1="170" x2="305" y2="170" class="connection-line" />
<line x1="245" y1="270" x2="305" y2="270" class="connection-line" />
<line x1="245" y1="370" x2="305" y2="370" class="connection-line" />
<line x1="515" y1="170" x2="575" y2="170" class="connection-line" />
<line x1="515" y1="270" x2="575" y2="270" class="connection-line" />
<line x1="515" y1="370" x2="575" y2="370" class="connection-line" />
<line x1="785" y1="170" x2="845" y2="170" class="connection-line" />
<path d="M 785 370 L 815.0 370 L 815.0 305 L 845 305" class="connection-line" />
</svg>