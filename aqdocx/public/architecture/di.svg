<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Handdrawn/Sketch Filter -->
    <filter id="handdrawn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Flat Pastel Gradients for Hand-Drawn Vibe -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;display=swap');

    .bg { fill: #f9fafb; rx: 12px; }
    .border-stroke { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: -0.01em; }
    
    /* Card Styles */
    .card-bg { stroke: #1e293b; stroke-width: 2; rx: 6px; }
    .node-text-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .node-text-desc { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 11.5px; fill: #334155; font-weight: 600; line-height: 1.4; }
    
    /* Group Styles */
    .group-rect { rx: 10px; fill: #f3f4f6; stroke: #475569; stroke-dasharray: 6 6; stroke-width: 1.8; }
    .group-label { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.05em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #1e293b; stroke-width: 2.2; }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 5 5; }
    .connection-error { fill: none; stroke: #e11d48; stroke-width: 2.2; stroke-dasharray: 4 4; }
    
    /* Badges */
    .badge-rect { rx: 4px; fill: #334155; }
    .badge-text { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1050" height="480" class="bg" rx="" ry="" />
  <rect width="1048" height="478" x="1" y="1" class="border-stroke" rx="" ry="" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Dependency Injection Engine Architecture</text>
  </g>
  
  
  <g>
    <rect x="20" y="100" width="240" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="35" y="92" class="group-label">1. DISCOVERY AND DECL.</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="130" width="210" height="85" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="51" y="154" class="node-text-title">@service Decorator</text>
    
    <!-- Description -->
    <text x="51" y="172" class="node-text-desc">Marks class as a DI</text><text x="51" y="187" class="node-text-desc">injectable service</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="157" y="144" width="72" height="14" rx="" ry="" />
    <text class="badge-text" x="193.0" y="154" text-anchor="middle">ANNOTATION</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="230" width="210" height="85" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="51" y="254" class="node-text-title">@factory Decorator</text>
    
    <!-- Description -->
    <text x="51" y="272" class="node-text-desc">Marks method returning</text><text x="51" y="287" class="node-text-desc">custom value/provider</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="35" y="330" width="210" height="85" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="51" y="354" class="node-text-title">Manifest Decl.</text>
    
    <!-- Description -->
    <text x="51" y="372" class="node-text-desc">Manual list in AppManifest</text><text x="51" y="387" class="node-text-desc">services array</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <rect x="290" y="100" width="240" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="305" y="92" class="group-label">2. PROVIDER REGISTRY</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="130" width="210" height="85" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="321" y="154" class="node-text-title">ClassProvider</text>
    
    <!-- Description -->
    <text x="321" y="172" class="node-text-desc">Instantiates target</text><text x="321" y="187" class="node-text-desc">class when resolved</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="439" y="144" width="60" height="14" rx="" ry="" />
    <text class="badge-text" x="469.0" y="154" text-anchor="middle">PROVIDER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="230" width="210" height="85" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="321" y="254" class="node-text-title">FactoryProvider</text>
    
    <!-- Description -->
    <text x="321" y="272" class="node-text-desc">Invokes factory function</text><text x="321" y="287" class="node-text-desc">with dynamic params</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="305" y="330" width="210" height="85" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="321" y="354" class="node-text-title">ValueProvider</text>
    
    <!-- Description -->
    <text x="321" y="372" class="node-text-desc">Wraps raw configured</text><text x="321" y="387" class="node-text-desc">objects / secrets</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <rect x="560" y="100" width="240" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="575" y="92" class="group-label">3. CONTAINER AND SCOPES</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="130" width="210" height="85" class="card-bg" fill="url(#violetGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="591" y="154" class="node-text-title">Singleton Scope</text>
    
    <!-- Description -->
    <text x="591" y="172" class="node-text-desc">Shared across the entire</text><text x="591" y="187" class="node-text-desc">runtime lifetime</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="721" y="144" width="48" height="14" rx="" ry="" />
    <text class="badge-text" x="745.0" y="154" text-anchor="middle">GLOBAL</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="230" width="210" height="85" class="card-bg" fill="url(#violetGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="591" y="254" class="node-text-title">App Scope</text>
    
    <!-- Description -->
    <text x="591" y="272" class="node-text-desc">Bound to the server</text><text x="591" y="287" class="node-text-desc">bootstrap instance</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="575" y="330" width="210" height="85" class="card-bg" fill="url(#violetGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="591" y="354" class="node-text-title">Request Scope</text>
    
    <!-- Description -->
    <text x="591" y="372" class="node-text-desc">Instantiated and destroyed</text><text x="591" y="387" class="node-text-desc">per HTTP/WS connection</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="703" y="344" width="66" height="14" rx="" ry="" />
    <text class="badge-text" x="736.0" y="354" text-anchor="middle">TRANSIENT</text>
        
  </g>

  <g>
    <rect x="830" y="100" width="240" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="845" y="92" class="group-label">4. RESOLUTION ENGINE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="845" y="130" width="210" height="105" class="card-bg" fill="url(#emeraldGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="861" y="154" class="node-text-title">Topological Sorting</text>
    
    <!-- Description -->
    <text x="861" y="172" class="node-text-desc">Calculates compilation</text><text x="861" y="187" class="node-text-desc">order; resolves service</text><text x="861" y="202" class="node-text-desc">dependencies first</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="967" y="144" width="72" height="14" rx="" ry="" />
    <text class="badge-text" x="1003.0" y="154" text-anchor="middle">AST ENGINE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="845" y="260" width="210" height="95" class="card-bg" fill="url(#roseGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="861" y="284" class="node-text-title">DI Diagnostics</text>
    
    <!-- Description -->
    <text x="861" y="302" class="node-text-desc">Performs dry-run checks;</text><text x="861" y="317" class="node-text-desc">detects cyclical dependencies</text><text x="861" y="332" class="node-text-desc">and raises errors</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="967" y="274" width="72" height="14" rx="" ry="" />
    <text class="badge-text" x="1003.0" y="284" text-anchor="middle">VALIDATION</text>
        
  </g>
<path d="M 245 170 C 275 170 275 170 305 170" class="connection-line" filter="url(#handdrawn)" /><path d="M 305 170 L 295.0 175.0 L 295.0 165.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 245 270 C 275 270 275 270 305 270" class="connection-line" filter="url(#handdrawn)" /><path d="M 305 270 L 295.0 275.0 L 295.0 265.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 245 370 C 275 370 275 370 305 370" class="connection-line" filter="url(#handdrawn)" /><path d="M 305 370 L 295.0 375.0 L 295.0 365.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 515 170 C 545 170 545 170 575 170" class="connection-line" filter="url(#handdrawn)" /><path d="M 575 170 L 565.0 175.0 L 565.0 165.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 515 270 C 545 270 545 270 575 270" class="connection-line" filter="url(#handdrawn)" /><path d="M 575 270 L 565.0 275.0 L 565.0 265.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 515 370 C 545 370 545 370 575 370" class="connection-line" filter="url(#handdrawn)" /><path d="M 575 370 L 565.0 375.0 L 565.0 365.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 785 170 C 815 170 815 170 845 170" class="connection-line" filter="url(#handdrawn)" /><path d="M 845 170 L 835.0 175.0 L 835.0 165.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 785 370 L 815.0 370 L 815.0 305 L 845 305" class="connection-line" filter="url(#handdrawn)" /><path d="M 845 305 L 835.0 310.0 L 835.0 300.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
</svg>