<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 320" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Handdrawn/Sketch Filter -->
    <filter id="handdrawn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Flat Pastel Gradients for Hand-Drawn Vibe -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;display=swap');

    .bg { fill: #f9fafb; rx: 12px; }
    .border-stroke { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: -0.01em; }
    
    /* Card Styles */
    .card-bg { stroke: #1e293b; stroke-width: 2; rx: 6px; }
    .node-text-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .node-text-desc { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 11.5px; fill: #334155; font-weight: 600; line-height: 1.4; }
    
    /* Group Styles */
    .group-rect { rx: 10px; fill: #f3f4f6; stroke: #475569; stroke-dasharray: 6 6; stroke-width: 1.8; }
    .group-label { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.05em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #1e293b; stroke-width: 2.2; }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 5 5; }
    .connection-error { fill: none; stroke: #e11d48; stroke-width: 2.2; stroke-dasharray: 4 4; }
    
    /* Badges */
    .badge-rect { rx: 4px; fill: #334155; }
    .badge-text { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1240" height="320" class="bg" rx="" ry="" />
  <rect width="1238" height="318" x="1" y="1" class="border-stroke" rx="" ry="" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Manifest and Component Wiring Architecture</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="30" y="110" width="240" height="95" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="46" y="134" class="node-text-title">workspace.py</text>
    
    <!-- Description -->
    <text x="46" y="152" class="node-text-desc">Defines the workspace name,</text><text x="46" y="167" class="node-text-desc">integrations, global</text><text x="46" y="182" class="node-text-desc">middleware, and modules list</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="188" y="124" width="66" height="14" rx="" ry="" />
    <text class="badge-text" x="221.0" y="134" text-anchor="middle">WORKSPACE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="30" y="240" width="240" height="95" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="46" y="264" class="node-text-title">modules/*/manifest.py</text>
    
    <!-- Description -->
    <text x="46" y="282" class="node-text-desc">Declares local controllers,</text><text x="46" y="297" class="node-text-desc">services, task configurations,</text><text x="46" y="312" class="node-text-desc">and autowire directives</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="170" y="254" width="84" height="14" rx="" ry="" />
    <text class="badge-text" x="212.0" y="264" text-anchor="middle">APP MANIFEST</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="330" y="170" width="250" height="105" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="346" y="194" class="node-text-title">PackageScanner</text>
    
    <!-- Description -->
    <text x="346" y="212" class="node-text-desc">Traverses filesystem modules</text><text x="346" y="227" class="node-text-desc">folder, parses AST metadata,</text><text x="346" y="242" class="node-text-desc">registers manifest objects</text><text x="346" y="257" class="node-text-desc">and imports target packages</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="498" y="184" width="66" height="14" rx="" ry="" />
    <text class="badge-text" x="531.0" y="194" text-anchor="middle">DISCOVERY</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="640" y="170" width="250" height="105" class="card-bg" fill="url(#violetGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="656" y="194" class="node-text-title">RuntimeRegistry</text>
    
    <!-- Description -->
    <text x="656" y="212" class="node-text-desc">Compiles manifests into an</text><text x="656" y="227" class="node-text-desc">in-memory route dictionary,</text><text x="656" y="242" class="node-text-desc">dependency graph structure,</text><text x="656" y="257" class="node-text-desc">and server environment</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="814" y="184" width="60" height="14" rx="" ry="" />
    <text class="badge-text" x="844.0" y="194" text-anchor="middle">REGISTRY</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="950" y="170" width="250" height="105" class="card-bg" fill="url(#emeraldGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="966" y="194" class="node-text-title">Aquilary.from_manifests</text>
    
    <!-- Description -->
    <text x="966" y="212" class="node-text-desc">Resolves manifest parameters</text><text x="966" y="227" class="node-text-desc">at boot, validates schemas,</text><text x="966" y="242" class="node-text-desc">instantiates controllers and</text><text x="966" y="257" class="node-text-desc">wires ASGI path mappings</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1118" y="184" width="66" height="14" rx="" ry="" />
    <text class="badge-text" x="1151.0" y="194" text-anchor="middle">BOOTSTRAP</text>
        
  </g>
<path d="M 270 155 L 300.0 155 L 300.0 220 L 330 220" class="connection-line" filter="url(#handdrawn)" /><path d="M 330 220 L 320.0 225.0 L 320.0 215.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 270 285 L 300.0 285 L 300.0 220 L 330 220" class="connection-line" filter="url(#handdrawn)" /><path d="M 330 220 L 320.0 225.0 L 320.0 215.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 580 220 C 610 220 610 220 640 220" class="connection-line" filter="url(#handdrawn)" /><path d="M 640 220 L 630.0 225.0 L 630.0 215.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" /><text x="610.0" y="212.0" text-anchor="middle" font-family="'Architects Daughter', 'Comic Sans MS', cursive, sans-serif" font-size="11px" font-weight="600" fill="#475569">Register</text>
<path d="M 890 220 C 920 220 920 220 950 220" class="connection-line" filter="url(#handdrawn)" /><path d="M 950 220 L 940.0 225.0 L 940.0 215.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" /><text x="920.0" y="212.0" text-anchor="middle" font-family="'Architects Daughter', 'Comic Sans MS', cursive, sans-serif" font-size="11px" font-weight="600" fill="#475569">Initialize</text>
</svg>