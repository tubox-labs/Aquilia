<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Handdrawn/Sketch Filter -->
    <filter id="handdrawn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Flat Pastel Gradients for Hand-Drawn Vibe -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;display=swap');

    .bg { fill: #f9fafb; rx: 12px; }
    .border-stroke { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: -0.01em; }
    
    /* Card Styles */
    .card-bg { stroke: #1e293b; stroke-width: 2; rx: 6px; }
    .node-text-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .node-text-desc { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 11.5px; fill: #334155; font-weight: 600; line-height: 1.4; }
    
    /* Group Styles */
    .group-rect { rx: 10px; fill: #f3f4f6; stroke: #475569; stroke-dasharray: 6 6; stroke-width: 1.8; }
    .group-label { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.05em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #1e293b; stroke-width: 2.2; }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 5 5; }
    .connection-error { fill: none; stroke: #e11d48; stroke-width: 2.2; stroke-dasharray: 4 4; }
    
    /* Badges */
    .badge-rect { rx: 4px; fill: #334155; }
    .badge-text { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="980" height="480" class="bg" rx="" ry="" />
  <rect width="978" height="478" x="1" y="1" class="border-stroke" rx="" ry="" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Flow Pipeline and Effect Orchestration</text>
  </g>
  
  
  <g>
    <rect x="20" y="100" width="520" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="35" y="92" class="group-label">FLOWPIPELINE EXECUTION NODES</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="140" width="220" height="95" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="56" y="164" class="node-text-title">1. Guard Nodes</text>
    
    <!-- Description -->
    <text x="56" y="182" class="node-text-desc">ClearanceGuard / RequireAuth</text><text x="56" y="197" class="node-text-desc">verifies request permissions</text><text x="56" y="212" class="node-text-desc">and short-circuits if forbidden</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="184" y="154" width="60" height="14" rx="" ry="" />
    <text class="badge-text" x="214.0" y="164" text-anchor="middle">SECURITY</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="255" width="220" height="85" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="56" y="279" class="node-text-title">2. Transform Nodes</text>
    
    <!-- Description -->
    <text x="56" y="297" class="node-text-desc">Transforms input body;</text><text x="56" y="312" class="node-text-desc">molds typed contracts</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="40" y="355" width="220" height="90" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="56" y="379" class="node-text-title">3. Handler Node</text>
    
    <!-- Description -->
    <text x="56" y="397" class="node-text-desc">Controller action execution;</text><text x="56" y="412" class="node-text-desc">business logic execution</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="196" y="369" width="48" height="14" rx="" ry="" />
    <text class="badge-text" x="220.0" y="379" text-anchor="middle">ACTION</text>
        
  </g>

  <g>
    <rect x="580" y="100" width="380" height="360" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="595" y="92" class="group-label">EFFECTSCOPE MANAGEMENT</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="140" width="340" height="105" class="card-bg" fill="url(#amberGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="616" y="164" class="node-text-title">4. Effect Requirements (@requires)</text>
    
    <!-- Description -->
    <text x="616" y="182" class="node-text-desc">Handler declares: @requires(DBTx['write'], Cache['user'])</text><text x="616" y="197" class="node-text-desc">Acquires matching database transaction and cache</text><text x="616" y="212" class="node-text-desc">namespace resources from registry</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="870" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="897.0" y="164" text-anchor="middle">ACQUIRE</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="260" width="340" height="85" class="card-bg" fill="url(#amberGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="616" y="284" class="node-text-title">5. Provider Allocation</text>
    
    <!-- Description -->
    <text x="616" y="302" class="node-text-desc">EffectProvider resolves connection pool / client;</text><text x="616" y="317" class="node-text-desc">binds resource reference to FlowContext.effects</text>
    
    <!-- Badge -->
    
  </g>

  <g>
    <!-- Card Body -->
    <rect x="600" y="360" width="340" height="85" class="card-bg" fill="url(#emeraldGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="616" y="384" class="node-text-title">6. Resource Release and Commit</text>
    
    <!-- Description -->
    <text x="616" y="402" class="node-text-desc">Concludes flow; commits DB changes;</text><text x="616" y="417" class="node-text-desc">releases resource handles back to pool</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="870" y="374" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="897.0" y="384" text-anchor="middle">RELEASE</text>
        
  </g>
<path d="M 260 185 C 260 240 280 240 280 295" class="connection-line" filter="url(#handdrawn)" /><path d="M 280 295 L 273.2917960675006 286.05572809000085 L 283.1304951684997 284.266873708001 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 260 295 C 260 345 280 345 280 395" class="connection-line" filter="url(#handdrawn)" /><path d="M 280 395 L 273.13593527016354 386.17477391878174 L 282.94174202707273 384.2136125673999 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 260 395 L 430.0 395 L 430.0 190 L 600 190" class="connection-line" filter="url(#handdrawn)" /><path d="M 600 190 L 590.0 195.0 L 590.0 185.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" /><text x="430.0" y="284.5" text-anchor="middle" font-family="'Architects Daughter', 'Comic Sans MS', cursive, sans-serif" font-size="11px" font-weight="600" fill="#475569">Declares</text>
<path d="M 770 245 C 770 252.5 770 252.5 770 260" class="connection-line" filter="url(#handdrawn)" /><path d="M 770 260 L 765.0 250.0 L 775.0 250.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 770 345 C 770 352.5 770 352.5 770 360" class="connection-line" filter="url(#handdrawn)" /><path d="M 770 360 L 765.0 350.0 L 775.0 350.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
</svg>