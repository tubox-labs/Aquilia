<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 330" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Handdrawn/Sketch Filter -->
    <filter id="handdrawn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Flat Pastel Gradients for Hand-Drawn Vibe -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;display=swap');

    .bg { fill: #f9fafb; rx: 12px; }
    .border-stroke { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
    .title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: -0.01em; }
    
    /* Card Styles */
    .card-bg { stroke: #1e293b; stroke-width: 2; rx: 6px; }
    .node-text-title { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .node-text-desc { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 11.5px; fill: #334155; font-weight: 600; line-height: 1.4; }
    
    /* Group Styles */
    .group-rect { rx: 10px; fill: #f3f4f6; stroke: #475569; stroke-dasharray: 6 6; stroke-width: 1.8; }
    .group-label { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 0.05em; }
    
    /* Connection lines */
    .connection-line { fill: none; stroke: #1e293b; stroke-width: 2.2; }
    .connection-dashed { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 5 5; }
    .connection-error { fill: none; stroke: #e11d48; stroke-width: 2.2; stroke-dasharray: 4 4; }
    
    /* Badges */
    .badge-rect { rx: 4px; fill: #334155; }
    .badge-text { font-family: 'Architects Daughter', 'Comic Sans MS', cursive, sans-serif; font-size: 9px; font-weight: 800; fill: #ffffff; }
  </style>

  <rect width="1460" height="330" class="bg" rx="" ry="" />
  <rect width="1458" height="328" x="1" y="1" class="border-stroke" rx="" ry="" />
  
  <!-- Title and Subtitle Block -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Aquilia Middleware Chain Execution Flow</text>
  </g>
  
  
  <g>
    <!-- Card Body -->
    <rect x="20" y="160" width="150" height="90" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="36" y="184" class="node-text-title">ASGI Request</text>
    
    <!-- Description -->
    <text x="36" y="202" class="node-text-desc">Client initiates</text><text x="36" y="217" class="node-text-desc">HTTP connection</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="94" y="174" width="60" height="14" rx="" ry="" />
    <text class="badge-text" x="124.0" y="184" text-anchor="middle">INCOMING</text>
        
  </g>

  <g>
    <rect x="190" y="100" width="900" height="200" class="group-rect" filter="url(#handdrawn)" rx="" ry="" />
    <text x="205" y="92" class="group-label">MIDDLEWARE EXECUTION PIPELINE</text>
  </g>

  <g>
    <!-- Card Body -->
    <rect x="205" y="140" width="160" height="90" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="221" y="164" class="node-text-title">CORS / CSP Guard</text>
    
    <!-- Description -->
    <text x="221" y="182" class="node-text-desc">Security policy</text><text x="221" y="197" class="node-text-desc">headers check</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="295" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="322.0" y="164" text-anchor="middle">PRIO 10</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="380" y="140" width="160" height="90" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="396" y="164" class="node-text-title">Request ID</text>
    
    <!-- Description -->
    <text x="396" y="182" class="node-text-desc">Assigns unique</text><text x="396" y="197" class="node-text-desc">trace ID to ctx</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="470" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="497.0" y="164" text-anchor="middle">PRIO 20</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="555" y="140" width="160" height="90" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="571" y="164" class="node-text-title">Session Manager</text>
    
    <!-- Description -->
    <text x="571" y="182" class="node-text-desc">Loads session</text><text x="571" y="197" class="node-text-desc">cryptographic state</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="645" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="672.0" y="164" text-anchor="middle">PRIO 30</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="730" y="140" width="160" height="90" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="746" y="164" class="node-text-title">Auth Guard</text>
    
    <!-- Description -->
    <text x="746" y="182" class="node-text-desc">Verifies token;</text><text x="746" y="197" class="node-text-desc">binds Identity</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="820" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="847.0" y="164" text-anchor="middle">PRIO 40</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="905" y="140" width="160" height="90" class="card-bg" fill="url(#slateGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="921" y="164" class="node-text-title">Telemetry Tracer</text>
    
    <!-- Description -->
    <text x="921" y="182" class="node-text-desc">Starts distributed</text><text x="921" y="197" class="node-text-desc">tracing span</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="995" y="154" width="54" height="14" rx="" ry="" />
    <text class="badge-text" x="1022.0" y="164" text-anchor="middle">PRIO 50</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1110" y="160" width="160" height="90" class="card-bg" fill="url(#emeraldGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="1126" y="184" class="node-text-title">Controller Router</text>
    
    <!-- Description -->
    <text x="1126" y="202" class="node-text-desc">Matches route;</text><text x="1126" y="217" class="node-text-desc">runs FlowPipeline</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1182" y="174" width="72" height="14" rx="" ry="" />
    <text class="badge-text" x="1218.0" y="184" text-anchor="middle">CONTROLLER</text>
        
  </g>

  <g>
    <!-- Card Body -->
    <rect x="1290" y="160" width="150" height="90" class="card-bg" fill="url(#blueGrad)" filter="url(#handdrawn)" rx="" ry="" />
    
    <!-- Title -->
    <text x="1306" y="184" class="node-text-title">ASGI Response</text>
    
    <!-- Description -->
    <text x="1306" y="202" class="node-text-desc">Returns response</text><text x="1306" y="217" class="node-text-desc">to target client</text>
    
    <!-- Badge -->
    
    <rect class="badge-rect" x="1364" y="174" width="60" height="14" rx="" ry="" />
    <text class="badge-text" x="1394.0" y="184" text-anchor="middle">OUTGOING</text>
        
  </g>
<path d="M 170 185 C 187.5 185 187.5 185 205 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 205 185 L 195.0 190.0 L 195.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 365 185 C 372.5 185 372.5 185 380 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 380 185 L 370.0 190.0 L 370.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 540 185 C 547.5 185 547.5 185 555 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 555 185 L 545.0 190.0 L 545.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 715 185 C 722.5 185 722.5 185 730 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 730 185 L 720.0 190.0 L 720.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 890 185 C 897.5 185 897.5 185 905 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 905 185 L 895.0 190.0 L 895.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 1065 185 C 1087.5 185 1087.5 185 1110 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 1110 185 L 1100.0 190.0 L 1100.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 1270 185 C 1280 185 1280 185 1290 185" class="connection-line" filter="url(#handdrawn)" /><path d="M 1290 185 L 1280.0 190.0 L 1280.0 180.0 Z" fill="#1e293b" stroke="#1e293b" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 1110 225 C 1087.5 225 1087.5 225 1065 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 1065 225 L 1075.0 220.0 L 1075.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 905 225 C 897.5 225 897.5 225 890 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 890 225 L 900.0 220.0 L 900.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 730 225 C 722.5 225 722.5 225 715 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 715 225 L 725.0 220.0 L 725.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 555 225 C 547.5 225 547.5 225 540 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 540 225 L 550.0 220.0 L 550.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 380 225 C 372.5 225 372.5 225 365 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 365 225 L 375.0 220.0 L 375.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
<path d="M 205 225 C 187.5 225 187.5 225 170 225" class="connection-dashed" filter="url(#handdrawn)" /><path d="M 170 225 L 180.0 220.0 L 180.0 230.0 Z" fill="#475569" stroke="#475569" stroke-width="1" filter="url(#handdrawn)" />
</svg>