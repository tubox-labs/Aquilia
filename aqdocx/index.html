      <h1>Aquilia — High-Performance Async Python Web Framework</h1>
      <p>Aquilia is a Manifest-First, async-native Python framework with zero boilerplate. Build production-ready APIs with built-in ORM, dependency injection, auth, sessions, caching, WebSockets, background tasks, MLOps, and admin dashboard.</p>
      <h2>Quick Start</h2>
      <p>Install: <code>pip install aquilia</code></p>
      <h2>Features</h2>
      <ul>
        <li>Manifest-First architecture — declare modules, routes auto-generate</li>
        <li>Async-native — built on ASGI with full async/await support</li>
        <li>Built-in ORM with migrations, QuerySet, and relationships</li>
        <li>Dependency Injection container with scopes and lifecycle</li>
        <li>Authentication system with OAuth, MFA, JWT, and RBAC</li>
        <li>Session management with pluggable stores</li>
        <li>Background task queue with priority scheduling</li>
        <li>WebSocket controllers with pub/sub rooms</li>
        <li>Cache layer with memory and Redis backends</li>
        <li>MLOps deployment with model registry and serving</li>
        <li>Admin dashboard with audit log and monitoring</li>
        <li>CLI generators for scaffolding modules</li>
        <li>Docker and Kubernetes manifest generation</li>
      </ul>
      <p><a href="https://aquilia.tubox.cloud/docs">Read the documentation</a> | <a href="https://github.com/axiomchronicles/Aquilia">GitHub</a></p>
